models:
  - name: qwen-turbo
    use: langchain_openai:ChatOpenAI
    model: qwen-turbo
    api_key: $DASHSCOPE_API_KEY
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.7

agent:
  name: KumaAgent
  description: A helpful AI assistant built on LangGraph
  default_model: qwen-turbo

tools:
  calculator: true
  current_time: true
  web_search: false

middlewares:
  log: true
  title: true
