syntax = "proto3";

package kumaagent.v1;

option java_package = "com.kuma.ai.agent.grpc";
option java_outer_classname = "KumaAgentProto";
option java_multiple_files = true;

// ─────────────────────────────────────────────
// Service definition  (mirrors app/gateway routers)
// ─────────────────────────────────────────────
service KumaAgentService {

  // ── Health ──────────────────────────────────
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // ── Models ──────────────────────────────────
  rpc ListModels(ListModelsRequest)       returns (ListModelsResponse);
  rpc GetModel(GetModelRequest)           returns (ModelInfo);

  // ── Agents ──────────────────────────────────
  rpc ListAgents(ListAgentsRequest)             returns (ListAgentsResponse);
  rpc CheckAgentName(CheckAgentNameRequest)     returns (CheckAgentNameResponse);
  rpc GetAgent(GetAgentRequest)                 returns (AgentInfo);
  rpc CreateAgent(CreateAgentRequest)           returns (AgentInfo);
  rpc UpdateAgent(UpdateAgentRequest)           returns (AgentInfo);
  rpc DeleteAgent(DeleteAgentRequest)           returns (DeleteAgentResponse);
  rpc GetUserProfile(GetUserProfileRequest)     returns (UserProfileResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserProfileResponse);

  // ── Memory ──────────────────────────────────
  rpc GetMemory(GetMemoryRequest)           returns (MemoryResponse);
  rpc ReloadMemory(ReloadMemoryRequest)     returns (MemoryResponse);
  rpc GetMemoryConfig(GetMemoryConfigRequest) returns (MemoryConfigResponse);
  rpc GetMemoryStatus(GetMemoryStatusRequest) returns (MemoryStatusResponse);

  // ── Skills ──────────────────────────────────
  rpc ListSkills(ListSkillsRequest)   returns (ListSkillsResponse);
  rpc GetSkill(GetSkillRequest)       returns (SkillInfo);
  rpc UpdateSkill(UpdateSkillRequest) returns (SkillInfo);

  // ── MCP ─────────────────────────────────────
  rpc GetMcpConfig(GetMcpConfigRequest)       returns (McpConfigResponse);
  rpc UpdateMcpConfig(UpdateMcpConfigRequest) returns (McpConfigResponse);

  // ── Channels ────────────────────────────────
  rpc GetChannelsStatus(GetChannelsStatusRequest) returns (ChannelsStatusResponse);
  rpc RestartChannel(RestartChannelRequest)       returns (RestartChannelResponse);
}

// ─────────────────────────────────────────────
// Health
// ─────────────────────────────────────────────
message HealthCheckRequest  {}
message HealthCheckResponse { string status = 1; }

// ─────────────────────────────────────────────
// Models
// ─────────────────────────────────────────────
message ListModelsRequest {}
message GetModelRequest   { string name = 1; }

message ModelInfo {
  string name                      = 1;
  string model                     = 2;
  string display_name              = 3;
  string description               = 4;
  bool   supports_thinking         = 5;
  bool   supports_reasoning_effort = 6;
}

message ListModelsResponse { repeated ModelInfo models = 1; }

// ─────────────────────────────────────────────
// Agents
// ─────────────────────────────────────────────
message ListAgentsRequest  {}
message GetUserProfileRequest {}

message CheckAgentNameRequest  { string name = 1; }
message CheckAgentNameResponse { bool available = 1; string name = 2; }

message GetAgentRequest    { string name = 1; }
message DeleteAgentRequest { string name = 1; }
message DeleteAgentResponse { string deleted = 1; }

message AgentInfo {
  string          name        = 1;
  string          description = 2;
  string          model       = 3;
  repeated string tool_groups = 4;
  string          soul        = 5;
}

message ListAgentsResponse { repeated AgentInfo agents = 1; }

message CreateAgentRequest {
  string          name        = 1;
  string          description = 2;
  string          model       = 3;
  repeated string tool_groups = 4;
  string          soul        = 5;
}

message UpdateAgentRequest {
  string          name               = 1;
  string          description        = 2;
  string          model              = 3;
  repeated string tool_groups        = 4;
  string          soul               = 5;
  bool            update_description = 6;
  bool            update_model       = 7;
  bool            update_tool_groups = 8;
  bool            update_soul        = 9;
}

message UpdateUserProfileRequest { string content = 1; }
message UserProfileResponse      { string content = 1; }

// ─────────────────────────────────────────────
// Memory
// ─────────────────────────────────────────────
message GetMemoryRequest      {}
message ReloadMemoryRequest   {}
message GetMemoryConfigRequest {}
message GetMemoryStatusRequest {}

message ContextSection {
  string summary    = 1;
  string updated_at = 2;
}

message UserMemoryContext {
  ContextSection work_context     = 1;
  ContextSection personal_context = 2;
  ContextSection top_of_mind      = 3;
}

message HistoryMemoryContext {
  ContextSection recent_months        = 1;
  ContextSection earlier_context      = 2;
  ContextSection long_term_background = 3;
}

message MemoryFact {
  string id         = 1;
  string content    = 2;
  string category   = 3;
  double confidence = 4;
  string created_at = 5;
  string source     = 6;
}

message MemoryResponse {
  string               version      = 1;
  string               last_updated = 2;
  UserMemoryContext    user         = 3;
  HistoryMemoryContext history      = 4;
  repeated MemoryFact  facts        = 5;
}

message MemoryConfigResponse {
  bool   enabled                   = 1;
  string storage_path              = 2;
  int32  debounce_seconds          = 3;
  int32  max_facts                 = 4;
  double fact_confidence_threshold = 5;
  bool   injection_enabled         = 6;
  int32  max_injection_tokens      = 7;
}

message MemoryStatusResponse {
  MemoryConfigResponse config = 1;
  MemoryResponse       data   = 2;
}

// ─────────────────────────────────────────────
// Skills
// ─────────────────────────────────────────────
message ListSkillsRequest {}
message GetSkillRequest   { string name = 1; }

message UpdateSkillRequest {
  string name    = 1;
  bool   enabled = 2;
}

message SkillInfo {
  string name        = 1;
  string description = 2;
  string license     = 3;
  string category    = 4;
  bool   enabled     = 5;
}

message ListSkillsResponse { repeated SkillInfo skills = 1; }

// ─────────────────────────────────────────────
// MCP
// ─────────────────────────────────────────────
message GetMcpConfigRequest    {}

message McpServerConfig {
  bool                     enabled     = 1;
  string                   type        = 2;
  string                   command     = 3;
  repeated string          args        = 4;
  map<string, string>      env         = 5;
  string                   url         = 6;
  map<string, string>      headers     = 7;
  string                   description = 8;
}

message McpConfigResponse {
  map<string, McpServerConfig> mcp_servers = 1;
}

message UpdateMcpConfigRequest {
  map<string, McpServerConfig> mcp_servers = 1;
}

// ─────────────────────────────────────────────
// Channels
// ─────────────────────────────────────────────
message GetChannelsStatusRequest {}

message ChannelStatus {
  bool enabled = 1;
  bool running = 2;
}

message ChannelsStatusResponse {
  bool                        service_running = 1;
  map<string, ChannelStatus>  channels        = 2;
}

message RestartChannelRequest  { string name = 1; }
message RestartChannelResponse { bool success = 1; string message = 2; }
