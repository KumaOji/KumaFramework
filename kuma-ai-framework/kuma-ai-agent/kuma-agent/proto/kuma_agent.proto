syntax = "proto3";

package kumaagent.v1;

// Java 选项：生成代码时使用
option java_package = "com.kuma.ai.agent.grpc";
option java_outer_classname = "KumaAgentProto";
option java_multiple_files = true;

// ─────────────────────────────────────────────
// Service definition
// ─────────────────────────────────────────────
service KumaAgentService {

  // 阻塞式对话：发送消息，等待完整回复
  rpc Chat(ChatRequest) returns (ChatResponse);

  // 流式对话：服务端流，逐 token 推送
  rpc ChatStream(ChatRequest) returns (stream StreamToken);

  // 列出所有会话线程
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);

  // 删除线程元数据
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);

  // 查询 Agent 配置
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // 列出所有可用模型
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);

  // ── Agents ──────────────────────────────────────────
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc GetAgent(GetAgentRequest) returns (AgentInfo);
  rpc CreateAgent(CreateAgentRequest) returns (AgentInfo);
  rpc UpdateAgent(UpdateAgentRequest) returns (AgentInfo);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (UserProfileResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserProfileResponse);

  // ── Memory ──────────────────────────────────────────
  rpc GetMemory(GetMemoryRequest) returns (MemoryResponse);
  rpc ReloadMemory(ReloadMemoryRequest) returns (MemoryResponse);

  // ── Skills ──────────────────────────────────────────
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc GetSkill(GetSkillRequest) returns (SkillInfo);
  rpc UpdateSkill(UpdateSkillRequest) returns (SkillInfo);
}

// ─────────────────────────────────────────────
// Chat
// ─────────────────────────────────────────────
message ChatRequest {
  // 用户消息文本
  string message = 1;
  // 会话 ID（为空时服务端自动生成）
  string thread_id = 2;
}

message ChatResponse {
  string thread_id = 1;
  string response  = 2;
  // 自动生成的会话标题（首次对话后产生）
  string title     = 3;
}

// 流式 token 事件
message StreamToken {
  string thread_id = 1;
  // 本次增量文本
  string delta     = 2;
  // true 表示本条为最后一条消息
  bool   done      = 3;
  // done=true 时携带完整回复
  string response  = 4;
  // done=true 时携带标题
  string title     = 5;
}

// ─────────────────────────────────────────────
// Threads
// ─────────────────────────────────────────────
message ListThreadsRequest {}

message ListThreadsResponse {
  repeated ThreadInfo threads = 1;
}

message ThreadInfo {
  string thread_id    = 1;
  string title        = 2;
  int32  message_count = 3;
}

message DeleteThreadRequest {
  string thread_id = 1;
}

message DeleteThreadResponse {
  string deleted = 1;
}

// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
message GetConfigRequest {}

message GetConfigResponse {
  string          agent_name  = 1;
  string          description = 2;
  string          model       = 3;
  repeated string tools       = 4;
}

// ─────────────────────────────────────────────
// Health
// ─────────────────────────────────────────────
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;  // "ok"
}

// ─────────────────────────────────────────────
// Models
// ─────────────────────────────────────────────
message ListModelsRequest {}

message ModelInfo {
  string name                      = 1;
  string model                     = 2;
  string display_name              = 3;
  string description               = 4;
  bool   supports_thinking         = 5;
  bool   supports_reasoning_effort = 6;
}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

// ─────────────────────────────────────────────
// Agents
// ─────────────────────────────────────────────
message AgentInfo {
  string           name        = 1;
  string           description = 2;
  string           model       = 3;
  repeated string  tool_groups = 4;
  string           soul        = 5;
}

message ListAgentsRequest {}
message ListAgentsResponse { repeated AgentInfo agents = 1; }

message GetAgentRequest { string name = 1; }

message CreateAgentRequest {
  string           name        = 1;
  string           description = 2;
  string           model       = 3;
  repeated string  tool_groups = 4;
  string           soul        = 5;
}

message UpdateAgentRequest {
  string           name               = 1;
  string           description        = 2;
  string           model              = 3;
  repeated string  tool_groups        = 4;
  string           soul               = 5;
  bool             update_description = 6;
  bool             update_model       = 7;
  bool             update_tool_groups = 8;
  bool             update_soul        = 9;
}

message DeleteAgentRequest  { string name = 1; }
message DeleteAgentResponse { string deleted = 1; }

message GetUserProfileRequest {}
message UpdateUserProfileRequest { string content = 1; }
message UserProfileResponse      { string content = 1; }

// ─────────────────────────────────────────────
// Memory
// ─────────────────────────────────────────────
message GetMemoryRequest    {}
message ReloadMemoryRequest {}

message ContextSection {
  string summary    = 1;
  string updated_at = 2;
}

message UserMemoryContext {
  ContextSection work_context     = 1;
  ContextSection personal_context = 2;
  ContextSection top_of_mind      = 3;
}

message HistoryMemoryContext {
  ContextSection recent_months       = 1;
  ContextSection earlier_context     = 2;
  ContextSection long_term_background = 3;
}

message MemoryFact {
  string id         = 1;
  string content    = 2;
  string category   = 3;
  double confidence = 4;
  string created_at = 5;
  string source     = 6;
}

message MemoryResponse {
  string               version      = 1;
  string               last_updated = 2;
  UserMemoryContext    user         = 3;
  HistoryMemoryContext history      = 4;
  repeated MemoryFact  facts        = 5;
}

// ─────────────────────────────────────────────
// Skills
// ─────────────────────────────────────────────
message SkillInfo {
  string name        = 1;
  string description = 2;
  string license     = 3;
  string category    = 4;
  bool   enabled     = 5;
}

message ListSkillsRequest  {}
message ListSkillsResponse { repeated SkillInfo skills = 1; }

message GetSkillRequest    { string name = 1; }

message UpdateSkillRequest {
  string name    = 1;
  bool   enabled = 2;
}
