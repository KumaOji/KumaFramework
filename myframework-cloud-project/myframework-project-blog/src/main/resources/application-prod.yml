# ========== 生产环境 (spring.profiles.active=prod)，上 frp / 公网用 ==========
# 用环境变量设置 JWT_SECRET、DB 密码等

# ----- Server -----
server:
  port: ${SERVER_PORT:9000}
  servlet:
    context-path: /
  shutdown: graceful
  undertow:
    buffer-size: 1024
    direct-buffers: true
    threads:
      io: 2
      worker: 16

# ----- Spring 通用 -----
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - com.baomidou.dynamic.datasource.spring.boot.autoconfigure.DynamicDataSourceAutoConfiguration
  main:
    lazy-initialization: true
    banner-mode: off
    allow-circular-references: false
    log-startup-info: false
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  cache:
    type: caffeine
    caffeine:
      spec: initialCapacity=100,maximumSize=1000,expireAfterWrite=30m,expireAfterAccess=30m
    cache-names:
      - default
      - article
      - user
  quartz:
    job-store-type: memory
    auto-startup: true
    startup-delay: 5s
    overwrite-existing-jobs: true
    wait-for-jobs-to-complete-on-shutdown: false
    properties:
      org.quartz.scheduler.instanceName: BlogScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: 10
      org.quartz.threadPool.threadPriority: 5
      org.quartz.jobStore.class: org.quartz.simpl.RAMJobStore
      org.quartz.jobStore.misfireThreshold: 60000
  datasource:
    dynamic:
      datasource:
        mysql:
          url: ${MYSQL_URL:jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true}
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:}
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            minimum-idle: 1
            maximum-pool-size: 20
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000
        postgresql:
          url: ${PG_URL:jdbc:postgresql://localhost:5432/postgres}
          username: ${PG_USERNAME:postgres}
          password: ${PG_PASSWORD:}
          driver-class-name: org.postgresql.Driver
          hikari:
            minimum-idle: 1
            maximum-pool-size: 20
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000

# ----- Schema 动态切换 -----
schema:
  default: blog
  filter:
    enabled: true

# ----- MyBatis Plus -----
mybatis-plus:
  configuration:
    lazy-loading-enabled: true
    lazy-load-trigger-methods: equals,clone,hashCode,toString
    aggressive-lazy-loading: false
    default-executor-type: reuse
    default-statement-timeout: 25

# ----- SpringDoc / Swagger（生产关闭） -----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ----- Blog 应用（Cookie / 登录限流） -----
blog:
  cookie-secure: true   # HTTPS 下必须 true
  login-rate-limit:
    enabled: true
    max-attempts: 5
    window-seconds: 60

# ----- JWT（生产必须设置环境变量 JWT_SECRET，至少 32 字符） -----
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000  # 24 小时，毫秒

# ----- Python 脚本 / LibreTranslate / MediaCrawler -----
python:
  normal:
    path: ${PYTHON_NORMAL_PATH:blog-module-Python/Normal}
    command: ${PYTHON_COMMAND:python}
  libreTranslate:
    enabled: ${LIBRETRANSLATE_ENABLED:true}
    path: ${LIBRETRANSLATE_PATH:}
    host: 127.0.0.1
    port: ${LIBRETRANSLATE_PORT:5000}
    load-only: zh,en,ja,ko,fr,de,es,ru
    threads: 2
    update-models: false
  mediaCrawler:
    enabled: false
    path: blog-module-Python/MediaCrawler
    command: uv
    port: 8081

translate:
  libre-translate-url: ${TRANSLATE_URL:http://127.0.0.1:5000}
  timeout: 30000

# ----- CORS（改为实际前端域名，勿用 *） -----
ballcat:
  web:
    cors-config:
      enabled: true
      url-pattern: "/**"
      allowed-origin-patterns:
        - "https://你的前端域名.com"
        # - "https://www.你的前端域名.com"
      allowed-methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
      allowed-headers:
        - "*"
      exposed-headers:
        - "traceId"
        - "Content-Disposition"
      allow-credentials: true
      max-age: 3600

# ----- Logging -----
logging:
  config: classpath:logback-spring.xml
