# ========== 开发环境 (spring.profiles.active=dev) ==========

# ----- Server -----
server:
  port: 9000
  servlet:
    context-path: /
  shutdown: graceful
  undertow:
    buffer-size: 1024
    direct-buffers: true
    threads:
      io: 2
      worker: 16

# ----- Spring 通用 -----
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - com.baomidou.dynamic.datasource.spring.boot.autoconfigure.DynamicDataSourceAutoConfiguration
  main:
    lazy-initialization: true
    banner-mode: off
    allow-circular-references: false
    log-startup-info: false
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  cache:
    type: caffeine
    caffeine:
      spec: initialCapacity=100,maximumSize=1000,expireAfterWrite=30m,expireAfterAccess=30m
    cache-names:
      - default
      - article
      - user
  quartz:
    job-store-type: memory
    auto-startup: true
    startup-delay: 5s
    overwrite-existing-jobs: true
    wait-for-jobs-to-complete-on-shutdown: false
    properties:
      org.quartz.scheduler.instanceName: BlogScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: 10
      org.quartz.threadPool.threadPriority: 5
      org.quartz.jobStore.class: org.quartz.simpl.RAMJobStore
      org.quartz.jobStore.misfireThreshold: 60000
  datasource:
    dynamic:
      datasource:
        mysql:
          url:
          username:
          password:
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            minimum-idle: 1
            maximum-pool-size: 20
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000
        postgresql:
          url: jdbc:postgresql://localhost:5432/postgres
          username: temp
          password: temp
          driver-class-name: org.postgresql.Driver
          hikari:
            minimum-idle: 1
            maximum-pool-size: 20
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000

# ----- Schema 动态切换 -----
schema:
  default: blog
  filter:
    enabled: true

# ----- MyBatis Plus -----
mybatis-plus:
  configuration:
    lazy-loading-enabled: true
    lazy-load-trigger-methods: equals,clone,hashCode,toString
    aggressive-lazy-loading: false
    default-executor-type: reuse
    default-statement-timeout: 25

# ----- SpringDoc / Swagger -----
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true
    filter: true
  show-actuator: false
  use-management-port: false
  cache:
    disabled: false
  packages-to-scan: cn.kuma.blog.main.controller

# ----- Blog 应用（Cookie / 登录限流） -----
blog:
  cookie-secure: false
  login-rate-limit:
    enabled: false
    max-attempts: 5
    window-seconds: 60

# ----- JWT -----
jwt:
  secret: jwt-secret-key-minimum-256-bits-long-for-hmac-sha256-algorithm
  expiration: 86400000  # 24 小时，毫秒

# ----- Python 脚本 / LibreTranslate / MediaCrawler -----
python:
  normal:
    path:
    command: python
  libreTranslate:
    enabled: true
    path:
    host: 127.0.0.1
    port: 5000
    load-only: zh,en,ja,ko,fr,de,es,ru
    threads: 2
    update-models: false

translate:
  libre-translate-url: http://127.0.0.1:5000
  timeout: 30000

# ----- CORS -----
ballcat:
  web:
    cors-config:
      enabled: true
      url-pattern: "/**"
      allowed-origin-patterns:
        - "http://localhost:5173"
        - "http://127.0.0.1:5173"
      allowed-methods:
        - "*"
      allowed-headers:
        - "*"
      exposed-headers:
        - "traceId"
        - "Content-Disposition"
      allow-credentials: false
      max-age: 3600

# ----- Logging -----
logging:
  config: classpath:logback-spring.xml
