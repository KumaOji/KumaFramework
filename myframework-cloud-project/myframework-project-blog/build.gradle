plugins {
    id 'java-library'
    alias(projectLibs.plugins.springboot)
    alias(projectLibs.plugins.spring.dependency.management)
}

def springBootVersion = projectLibs.versions.springboot.get()

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
    }
}

def root = rootProject
bootRun {
    systemProperty 'mysql.host', root.findProperty('mysql.host')
    systemProperty 'mysql.port', root.findProperty('mysql.port')
    systemProperty 'mysql.database', root.findProperty('mysql.database')
    systemProperty 'mysql.username', root.findProperty('mysql.username')
    systemProperty 'mysql.password', root.findProperty('mysql.password')
}

dependencies {
    implementation project(':myframework-cloud-framework:myframework-module-infrastruct')

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok

    testImplementation projectLibs.spring.boot.starter.test
}
