# Project2 - data-mybatis 简单使用展示
spring:
  config:
    import: optional:classpath:application-framework.yml
  profiles:
    active: dev
  application:
    name: project2
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: ${mysql.url}
          username: ${mysql.username}
          password: ${mysql.password}
          driver-class-name: com.mysql.cj.jdbc.Driver
        postgresql:
          url: ${postgresql.url}
          username: ${postgresql.username}
          password: ${postgresql.password}
          driver-class-name: org.postgresql.Driver
  # project2 为 data-mybatis 演示，不实际使用 Kafka，此处为占位配置以满足 module-mq-kafka 依赖
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

kuma:
  mybatis:
    default-schema: blog
