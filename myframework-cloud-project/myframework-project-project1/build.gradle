plugins {
    id 'java'
    alias(projectLibs.plugins.springboot)
    alias(projectLibs.plugins.spring.dependency.management)
}

def springBootVersion = projectLibs.versions.springboot.get()
dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
    }
}

dependencies {
    implementation project(':myframework-cloud-framework:myframework-module-application')
    runtimeOnly projectLibs.mysql
    runtimeOnly projectLibs.postgresql
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}

processResources {
    filesMatching('**/application.yml') {
        expand(
                mysql     : [
                        url     : project.findProperty('mysql.url'),
                        username: project.findProperty('mysql.username'),
                        password: project.findProperty('mysql.password')
                ],
                postgresql: [
                        url     : project.findProperty('postgresql.url'),
                        username: project.findProperty('postgresql.username'),
                        password: project.findProperty('postgresql.password')
                ],
                redis     : [
                        host   : project.findProperty('redis.host'),
                        port   : project.findProperty('redis.port'),
                        database: project.findProperty('redis.database'),
                        jedis  : [
                                pool: [
                                        'max-active': project.findProperty('redis.jedis.pool.max-active'),
                                        'max-idle'  : project.findProperty('redis.jedis.pool.max-idle'),
                                        'min-idle'  : project.findProperty('redis.jedis.pool.min-idle')
                                ]
                        ]
                ]
        )
    }
}

bootJar {
    archiveBaseName = 'project1'
}
