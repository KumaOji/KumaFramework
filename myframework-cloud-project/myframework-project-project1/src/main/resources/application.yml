# Project1 配置
# 数据源账号密码从 gradle.properties 注入
#
# Schema 切换默认值：
# - 默认数据源: mysql (spring.datasource.dynamic.primary)
# - 默认 schema: blog (kuma.mybatis.default-schema，与 MySQL 库名一致)

spring:
  application:
    name: project1
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: ${mysql.url}
          username: ${mysql.username}
          password: ${mysql.password}
          driver-class-name: com.mysql.cj.jdbc.Driver

kuma:
  mybatis:
    default-schema: blog
