# Project1 最简配置
# 默认数据源: master (dynamic-datasource primary)
# 默认数据库: H2 内存库 (dev) / MySQL (prod)

spring:
  application:
    name: project1
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:h2:mem:project1db
          driver-class-name: org.h2.Driver
          username: sa
          password: ''
  h2:
    console:
      enabled: true
