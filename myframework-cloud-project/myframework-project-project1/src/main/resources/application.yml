# Project1 - 项目配置（框架配置由 application-framework.yml 提供，未定义项使用框架默认值）
spring:
  config:
    import: optional:classpath:application-framework.yml
  profiles:
    active: dev
  application:
    name: project1
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: ${mysql.url}
          username: ${mysql.username}
          password: ${mysql.password}
          driver-class-name: com.mysql.cj.jdbc.Driver
        postgresql:
          url: ${postgresql.url}
          username: ${postgresql.username}
          password: ${postgresql.password}
          driver-class-name: org.postgresql.Driver
#        postgresql_2:
#          url: ${postgresql.url}
#          username: ${postgresql.username}
#          password: ${postgresql.password}
#          driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

kuma:
  mybatis:
    default-schema: blog
