# ========== 开发环境 - 启动优化 ==========
# 启用：spring.profiles.active=dev

spring:
  main:
    lazy-initialization: true
    banner-mode: off
    log-startup-info: false
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000

springdoc:
  packages-to-scan: com.kuma.cloud.project1.controller
  cache:
    disabled: false
