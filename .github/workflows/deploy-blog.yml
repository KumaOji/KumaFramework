name: Build & Deploy Blog

on:
  push:
    branches: [master]
    paths:
      - 'kuma-project/kuma-project-blog/**'
      - 'kuma-boot-framework/**'
      - 'gradle.properties'
      - 'build.gradle'
      - 'settings.gradle'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Compute versions
        id: ver
        run: |
          JAR_VERSION=$(date +%Y.%m.%d)
          GIT_SHA=$(git rev-parse --short HEAD)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "JAR_VERSION=${JAR_VERSION}"                          >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${JAR_VERSION}-${GIT_SHA}"                 >> $GITHUB_OUTPUT
          echo "IMAGE=ghcr.io/${OWNER}/blog:${JAR_VERSION}-${GIT_SHA}" >> $GITHUB_OUTPUT

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xms512m -Xmx2g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configuration-cache=false
          version=${{ steps.ver.outputs.JAR_VERSION }}
          group=io.github.kumaoji
          EOF

      - name: Build jar
        run: |
          chmod +x gradlew
          make -C kuma-project/kuma-project-blog build

      - name: Copy jar to Docker context
        run: |
          cp kuma-project/kuma-project-blog/build/libs/blog-${{ steps.ver.outputs.JAR_VERSION }}.jar \
             kuma-project/kuma-project-blog/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: kuma-project/kuma-project-blog
          push: true
          tags: ${{ steps.ver.outputs.IMAGE }}
          build-args: JAR_VERSION=${{ steps.ver.outputs.JAR_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BLOG_SERVER_HOST }}
          username: ${{ secrets.BLOG_SERVER_USER }}
          key: ${{ secrets.BLOG_SERVER_SSH_KEY }}
          script: |
            kubectl set image deployment/blog-background \
              blog-background=${{ steps.ver.outputs.IMAGE }} \
              -n blog
            kubectl rollout status deployment/blog-background -n blog --timeout=120s
