name: Build & Deploy Blog

on:
  push:
    branches: [master]
    paths:
      - 'kuma-project/kuma-project-blog/**'
      - 'kuma-boot-framework/**'
      - 'gradle.properties'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Compute versions
        id: ver
        run: |
          JAR_VERSION=$(date +%Y.%m.%d)
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "JAR_VERSION=${JAR_VERSION}"              >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${JAR_VERSION}-${GIT_SHA}"    >> $GITHUB_OUTPUT

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xms512m -Xmx2g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configuration-cache=false
          version=${{ steps.ver.outputs.JAR_VERSION }}
          group=io.github.kumaoji
          EOF

      - name: Build jar
        run: |
          chmod +x gradlew
          make -C kuma-project/kuma-project-blog build

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BLOG_SERVER_HOST }}
          username: ${{ secrets.BLOG_SERVER_USER }}
          key: ${{ secrets.BLOG_SERVER_SSH_KEY }}
          source: >-
            kuma-project/kuma-project-blog/build/libs/blog-${{ steps.ver.outputs.JAR_VERSION }}.jar,
            kuma-project/kuma-project-blog/Dockerfile,
            kuma-project/kuma-project-blog/Makefile
          target: /data/blog/background/
          strip_components: 3

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BLOG_SERVER_HOST }}
          username: ${{ secrets.BLOG_SERVER_USER }}
          key: ${{ secrets.BLOG_SERVER_SSH_KEY }}
          script: |
            make -C /data/blog/background all \
              JAR_VERSION=${{ steps.ver.outputs.JAR_VERSION }} \
              IMAGE_TAG=${{ steps.ver.outputs.IMAGE_TAG }}
