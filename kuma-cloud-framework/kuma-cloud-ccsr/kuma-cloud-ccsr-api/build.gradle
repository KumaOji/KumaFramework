// protobuf 插件需要独立的 buildscript 块提供构建类路径
buildscript {
    repositories {
        mavenCentral()
        maven { url = 'https://maven.aliyun.com/repository/public' }
    }
    dependencies {
        classpath "com.google.protobuf:protobuf-gradle-plugin:0.9.6"
    }
}

apply plugin: "com.google.protobuf"

dependencies {
    api(project(':kuma-boot-framework:kuma-boot-starter-common')) {
        exclude group: "com.caucho", module: "hessian"
    }
    api project(":kuma-cloud-ccsr:kuma-cloud-ccsr-common")

    api "com.caucho:hessian:4.0.63"
    api "com.google.api.grpc:proto-google-common-protos:2.17.0"
    api "io.netty:netty-all:4.2.9.Final"
    api "com.google.protobuf:protobuf-java:3.25.5"
    api "com.google.protobuf:protobuf-java-util:3.25.5"
    api "org.apache.thrift:libthrift:0.21.0"
    api "io.grpc:grpc-api:1.64.2"
    api "io.grpc:grpc-context:1.64.2"
    api "io.grpc:grpc-core:1.64.2"
    api "io.grpc:grpc-netty:1.64.2"
    api "io.grpc:grpc-netty-shaded:1.64.2"
    api "io.grpc:grpc-protobuf:1.64.2"
    api "io.grpc:grpc-protobuf-lite:1.64.2"
    api "io.grpc:grpc-stub:1.64.2"
    api "io.grpc:grpc-services:1.64.2"
    testImplementation("io.grpc:grpc-testing:1.64.2")
    api 'com.google.code.gson:gson:2.13.2'
    api 'com.google.guava:guava:33.5.0-jre'
    api 'org.reflections:reflections:0.10.2'

    api 'jakarta.xml.ws:jakarta.xml.ws-api:4.0.2'
    api "jakarta.servlet:jakarta.servlet-api:6.1.0"
    api "jakarta.validation:jakarta.validation-api:3.1.1"
    api "jakarta.annotation:jakarta.annotation-api:3.0.0"
    api "jakarta.activation:jakarta.activation-api:2.1.4"
    api "jakarta.json:jakarta.json-api:2.1.3"
    api "jakarta.json.bind:jakarta.json.bind-api:3.0.1"
}

configurations {
    configureEach {
        resolutionStrategy.cacheChangingModulesFor 0, "seconds"
        resolutionStrategy.cacheDynamicVersionsFor 0, "seconds"

        resolutionStrategy {
            force "com.google.protobuf:protobuf-java:3.25.5"
            force "com.google.protobuf:protobuf-java-util:3.25.5"
        }
    }
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:3.25.5"
    }
    clean {
        delete generatedFilesBaseDir
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:1.64.2"
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {
                option 'jakarta_omit'
                option '@generated=omit'
            }
        }
    }
}
