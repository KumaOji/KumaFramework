dependencies {
    api "org.springframework.boot:spring-boot-configuration-processor:4.0.2"
    api "org.springframework.boot:spring-boot-starter:4.0.2"

    api project(":kuma-cloud-ccsr:kuma-cloud-ccsr-client")
}

// 库模块不应向 classpath 投放日志配置文件，由消费方应用统一管理
processResources {
    exclude 'logback.xml'
    exclude 'logback-spring.xml'
    exclude 'log4j.properties'
    exclude 'log4j2.xml'
}
