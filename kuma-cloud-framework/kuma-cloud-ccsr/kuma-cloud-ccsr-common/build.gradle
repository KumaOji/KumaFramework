dependencies {
    api(project(':kuma-boot-framework:kuma-boot-starter-common')) {
        exclude group: "com.caucho", module: "hessian"
    }

    implementation projectLibs.gson
    implementation projectLibs.commons.lang3
    implementation projectLibs.commons.collections4
    implementation projectLibs.hutool.core

    api 'com.google.guava:guava:33.5.0-jre'
    api 'com.alibaba:fastjson:2.0.60'
    api 'org.rocksdb:rocksdbjni:9.4.0'
    api ("com.alipay.sofa:rpc-grpc-impl:1.4.0")
    api 'com.alipay.sofa:hessian:3.5.5'
    api('com.alipay.sofa:bolt:1.6.12') {
        exclude group: 'org.slf4j', module: 'slf4j-api'
    }
    api ("com.alipay.sofa:jraft-core:1.4.0")
}
