plugins { id 'org.springframework.boot' }
apply from: rootProject.file('gradle/springboot.gradle')

dependencies {
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-common")
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-worker")
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-retry")
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-api")
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-dag")
    api project(":kuma-cloud-framework:kuma-cloud-job:kuma-cloud-job-consistency")

    implementation "com.baomidou:mybatis-plus-spring-boot4-starter:3.5.16"
    implementation("org.springframework.boot:spring-boot-starter-webmvc:4.0.2") {
        //exclude group: "org.springframework.boot", module: "spring-boot-starter-tomcat"
        exclude group: "org.springframework.boot", module: "spring-boot-starter-undertow"
    }
    //implementation "org.springframework.boot:spring-boot-starter-undertow:4.0.2"
    implementation "org.springframework.boot:spring-boot-starter-tomcat:4.0.2"
    implementation "com.mysql:mysql-connector-j:9.6.0"
    implementation "net.devh:grpc-server-spring-boot-starter:3.1.0.RELEASE"
    implementation "com.cronutils:cron-utils:9.2.1"
}
