dependencies {
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-broker")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-client")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-cluster")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-common")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-consistency")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-dashboard")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-metrics")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-plugin")
    api project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-proxy")
}

jar {
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-broker").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-client").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-cluster").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-common").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-consistency").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-metrics").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-plugin").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-proxy").jar) { into("lib/") }
    from(project(":kuma-cloud-framework:kuma-cloud-mq:kuma-cloud-mq-nameserver").jar) { into("lib/") }

    //详细信息参考 https://docs.gradle.org/current/dsl/org.gradle.api.tasks.bundling.Jar.html
    //基本的文件名
    //archivesBaseName = 'Example'
    //文件夹大于65535个，需要开启zip64
    zip64 = true

    manifest {
        attributes 'Main-Class': "com.kuma.cloud.mq.example.consumer.ConsumerMain"
        attributes 'Class-Path': configurations.runtimeClasspath.files.collect { "lib/$it.name" }.join(' ')
    }

    //gradle 处理重复文件，include 最后一个重复文件“胜出”的默认策略。
    //duplicatesStrategy = 'include' // <<---- addition
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    into('lib') { // 将第三方jar放入 lib目录中
        from configurations.runtimeClasspath.findAll { it.name.endsWith('.jar') }
    }

    //打包依赖包
    //from {
    //    (configurations.runtimeClasspath).collect {
    //        it.isDirectory() ? it : zipTree(it)
    //    }
    //}

    //delete "${project.layout.buildDirectory.asFile.get()}\\libs\\lib"
    //from configurations.runtimeClasspath
    //into "${project.layout.buildDirectory.asFile.get()}\\libs\\lib"
    //from configurations.compileClasspath
    //into "${project.layout.buildDirectory.asFile.get()}\\libs\\lib"

    //into('lib') { // 将第三方jar放入 lib目录中
    //    from configurations.compile
    //}
}
