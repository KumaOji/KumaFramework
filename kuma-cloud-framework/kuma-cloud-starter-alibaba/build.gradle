plugins {
    id 'java-library'
}

description = 'Kumaframework alibaba cloud模块（Nacos注册/配置中心）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    api platform(projectLibs.spring.cloud.dependencies)
    api projectLibs.spring.cloud.starter.alibaba.nacos.discovery
    api projectLibs.spring.cloud.starter.alibaba.nacos.config
    api 'org.springframework.cloud:spring-cloud-context'
    api projectLibs.spring.boot.autoconfigure
}
