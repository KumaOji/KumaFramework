plugins {
    id 'java-library'
}

description = 'Kumaframework dubbo RPC模块（Apache Dubbo + Spring Cloud + Nacos注册发现 + 上下文透传）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    api platform(projectLibs.spring.cloud.dependencies)
    api platform(projectLibs.spring.cloud.alibaba.dependencies)
    // dubbo-spring-cloud-starter 复用 Spring Cloud 服务注册发现（搭配 kuma-cloud-starter-alibaba 的 Nacos）
    api projectLibs.dubbo.spring.cloud.starter
    api 'org.springframework.cloud:spring-cloud-context'
    api projectLibs.spring.boot.autoconfigure

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
