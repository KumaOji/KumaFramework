plugins {
    id 'java-library'
}

description = 'Kumaframework JDBC 连接池模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot 自动配置（@AutoConfiguration、@ConfigurationProperties 等注解）
    api projectLibs.spring.boot.autoconfigure

    // JDBC 驱动
    implementation "com.mysql:mysql-connector-j:9.6.0"

    // PooledDataSource 使用 io.micrometer.common.util.StringUtils
    implementation 'io.micrometer:micrometer-commons:1.14.0'

    // 日志
    implementation projectLibs.slf4j.api
    implementation projectLibs.logback.core
    implementation projectLibs.logback.access
    implementation projectLibs.logback.classic

    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:6.0.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:6.0.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.0.2'
    testImplementation "org.assertj:assertj-core:3.27.6"

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
    testCompileOnly projectLibs.lombok
    testAnnotationProcessor projectLibs.lombok
    annotationProcessor "org.projectlombok:lombok-mapstruct-binding:0.2.0"
}

// 库模块不应向 classpath 投放日志配置文件，由消费方应用统一管理
processResources {
    exclude 'logback.xml'
    exclude 'logback-spring.xml'
    exclude 'log4j.properties'
    exclude 'log4j2.xml'
}

tasks.register("generateMd5ForZip", Exec) {
    def zipFile = file("${project.layout.buildDirectory.asFile.get()}/libs/kuma-cloud-jdbcpool-2026.02.jar")
    def md5File = file("${project.layout.buildDirectory.asFile.get()}/libs/kuma-cloud-jdbcpool-2026.02.jar.md5")

    // 不声明 inputs.file：jar 在配置阶段尚未生成，声明会导致 Gradle 配置失败
    // jar 任务通过 finalizedBy 保证先于本任务执行
    outputs.file md5File

    if (System.getProperty("os.name").toLowerCase().contains("win")) {
        commandLine 'cmd', '/c', "certutil -hashfile ${zipFile.absolutePath} MD5 | findstr /v \"MD5\" | findstr /v \"certutil\" > ${md5File.absolutePath}"
    } else {
        commandLine 'bash', '-c', "md5sum ${zipFile.absolutePath} | awk '{print \$1}' > ${md5File.absolutePath}"
    }
}

test {
    useJUnitPlatform()
    failOnNoDiscoveredTests = false
    ignoreFailures = true  // 测试需要本地 MySQL，环境不具备时不阻断构建
}

jar.finalizedBy("generateMd5ForZip")
