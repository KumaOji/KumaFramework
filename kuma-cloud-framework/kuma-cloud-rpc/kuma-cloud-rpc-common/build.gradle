dependencies {
    api('com.alibaba.nacos:nacos-client:3.1.1') {
        exclude group: 'org.slf4j', module: 'slf4j-api'
    }

    api 'commons-codec:commons-codec:1.21.0'
    api 'redis.clients:jedis:7.2.1'
    api('io.lettuce:lettuce-core:6.8.1.RELEASE') {
        exclude group: 'io.netty', module: 'netty-handler'
        exclude group: 'io.netty', module: 'netty-common'
        exclude group: 'io.netty', module: 'netty-transport'
    }
    api 'tools.jackson.core:jackson-databind:3.0.4'
    api 'tools.jackson.core:jackson-core:3.0.4'
    api 'com.esotericsoftware:kryo:5.6.2'
    api 'com.caucho:hessian:4.0.66'
    api 'ch.qos.logback:logback-classic:1.5.26'
    api "com.google.guava:guava:33.5.0-jre"
    api "com.google.code.findbugs:jsr305:3.0.2"

    api 'io.netty:netty-all:4.2.9.Final'
    api 'com.alibaba.fastjson2:fastjson2:2.0.61'

    api("org.springframework.boot:spring-boot-starter-web:4.0.2") {
        exclude group: "org.springframework.boot", module: "spring-boot-starter-undertow"
    }
    api "org.springframework.boot:spring-boot-starter-tomcat:4.0.2"
    api 'org.aspectj:aspectjweaver:1.9.22.1'
}
