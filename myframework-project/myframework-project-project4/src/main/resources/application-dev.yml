spring:
  main:
    lazy-initialization: true
    log-startup-info: false
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      # 排除 knife4j 自带的 Knife4jOpenApiCustomizer（使用 List 调用 getGroupConfigs，与 springdoc 3.0 的 Set 不兼容），项目已通过 @EnableKnife4j 提供兼容实现
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
        postgresql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    # 抑制 spring.cache-CacheProperties 等 BeanPostProcessorChecker 告警（Spring Boot 内置 Bean 无法添加 ROLE_INFRASTRUCTURE）
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: false

# Knife4j 增强文档（doc.html 界面）
knife4j:
  enable: true

# 框架 Springdoc 配置（前缀 kuma.boot.springdoc）
kuma:
  boot:
    springdoc:
      enabled: true
      title: API 文档
      description: RESTful API 接口文档
      version: 1.0.0
      openapi: "3.0.0"
      packages-to-scan:
        - com.kuma.cloud.project4
      license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0.html

# 延迟线程池配置
delay:
  thread:
    core: 5
    max: 10
    queue: 100
    keepAlive: 60
