spring:
  datasource:
    druid:
      enable: true
      # 从这里开始(druid)
      username: ${spring.datasource.username}
      #密码回调
      #password-callback: com.jiashn.minio.config.RsaDBPasswordCallBack
      password: BePkkx2NHPYt9Dk9SFdYzqr0ZdFqVvELoD2tJ7awIcrDz1wtf6HpKqklDeph+TEt3btnshloolfu4nO/rIK2kqfCpTTz/pFhTyLJ1PN2U7PVb5bT89gpKOFKNM/tBx5/VH1BigciDNNPSFuQwwN6w7zNPLoq3Da/iFPc38znYT4=
      # connect-properties: password=${spring.datasource.druid.password}
      driver-class-name: ${spring.datasource.driver-class-name}
      #url: jdbc:mysql://127.0.0.1:3308/warehouse?characterEncoding=utf-8&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&useSSL=false&useUnicode=true
      url: ${spring.datasource.url}
      db-type: mysql
      # 连接池配置
      initialSize: 10 #	初始化时建立物理连接的个数。初始化发生在显示调用init方法，或者第一次getConnection时
      minIdle: 10 #最小连接池数量
      maxActive: 500 #最大连接池数量
      max-wait: 60000 #获取连接时最大等待时间，单位毫秒。配置了maxWait之后，缺省启用公平锁，并发效率会有所下降，如果需要可以通过配置useUnfairLock属性为true使用非公平锁
      pool-prepared-statements: true #是否缓存preparedStatement，也就是PSCache。PSCache对支持游标的数据库性能提升巨大，比如说oracle。在mysql下建议关闭。
      max-pool-prepared-statement-per-connection-size: 20 #要启用PSCache，必须配置大于0，当大于0时，poolPreparedStatements自动触发修改为true。在Druid中，不会存在Oracle下PSCache占用内存过多的问题，可以把这个数值配置大一些，比如说100
      validation-query: SELECT 'x' #用来检测连接是否有效的sql，要求是一个查询语句，常用select ‘x’。如果validationQuery为null，testOnBorrow、testOnReturn、testWhileIdle都不会起作用。
      test-on-borrow: false #申请连接时执行validationQuery检测连接是否有效，做了这个配置会降低性能。
      test-on-return: false #归还连接时执行validationQuery检测连接是否有效，做了这个配置会降低性能。
      test-while-idle: true #建议配置为true，不影响性能，并且保证安全性。申请连接的时候检测，如果空闲时间大于timeBetweenEvictionRunsMillis，执行validationQuery检测连接是否有效
      time-between-eviction-runs-millis: 60000  #配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      min-evictable-idle-time-millis: 300000    #配置一个连接在池中最小生存的时间，单位是毫秒
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000 # 通过connectProperties属性来打开mergeSql功能；慢SQL记录（配置慢SQL的定义时间）
      use-global-data-source-stat: true # 合并多个DruidDataSource的监控数据
      name: druid-db1 # 数据源名称：当存在多个数据源时，设置名字可以很方便的来进行区分,默认自动生成名称，格式是："DataSource-" + System.identityHashCode(this)
      # 1)Destroy线程会检测连接的间隔时间 2)testWhileIdle的判断依据(详细看testWhileIdle属性的说明)
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000 # 设置连接最小可收回空闲时间(毫秒)，默认为 1000L * 60L * 30L
      maxEvictableIdleTimeMillis: 900000 # 设置连接最大可收回空闲时间(毫秒)，默认为 1000L * 60L * 60L * 7
      validationQuery: SELECT 1 FROM DUAL  # 用来检测连接是否有效的sql,求是一个查询语句。默认为null，此时testOnBorrow、testOnReturn、testWhileIdle都不会其作用
      # 要启用PSCache，必须配置大于0，当大于0时， poolPreparedStatements自动触发修改为true，
      # 在Druid中，不会存在Oracle下PSCache占用内存过多的问题，可以把这个数值配置大一些，比如说100
      maxOpenPreparedStatements: 20
      # 连接池中的 minIdle 数量以内的连接，空闲时间超过 minEvictableIdleTimeMillis，则会执行 keepAlive 操作
      keepAlive: true
      # 每个连接大小的最大池准备语句数
      maxPoolPreparedStatementPerConnectionSize: 20
      # 是否使用全局数据源统计,默认false
      useGlobalDataSourceStat: true
      # 连接属性
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500
      # 配置监控统计的内置过滤器：
      # stat-监控统计(必须配置，否则监控不到sql)
      # wall-防御sql注入
      # log4j2-日志记录框架(值与应用中的日志框架保持一致，如 log4j、log4j、logback、slf4j)
      filters: stat,wall,slf4j
      filter:
        stat:
          enabled: true #开启 SQL 监控
          db-type: mysql
          log-slow-sql: true #记录慢查询 SQL
          slow-sql-millis: 2000 #慢查询
        slf4j:
          enabled: true
          statement-log-error-enabled: true
          statement-create-after-log-enabled: false
          statement-close-after-log-enabled: false
          result-set-open-after-log-enabled: false
          result-set-close-after-log-enabled: false
        wall:
          enabled: true
          config:
            update-allow: true                                                        #允许更新操作
            drop-table-allow: false                                                   #禁止删表操作
            insert-allow: true                                                       #允许插入操作
            delete-allow: true                                                        #删除数据操作
      # StatViewServlet配置
      web-stat-filter:
        enabled: true   #默认为false，表示不使用WebStatFilter配置，就是属性名去短线
        url-pattern: /*  #拦截该项目下的一切请求
        exclusions: "*.js , *.gif ,*.jpg ,*.png ,*.css ,*.ico , /druid/*"  #对这些请求放行
        session-stat-max-count: 1000
        profile-enable: true
        session-stat-enable: false
      # 监控配置 配置DruidStatViewServlet
      stat-view-servlet:
        enabled: true # 新版需要配置这个属性才能访问监控页面
        url-pattern: /druid/* #访问地址规则
        reset-enable: true  #  禁用HTML页面上的“Reset All”功能
        login-username: admin # 登录名
        login-password: 123456   # 登录密码
        allow: 127.0.0.1 # IP白名单(没有配置或者为空，则允许所有访问)
        deny: 192.168.0.1  # IP黑名单 (存在共同时，deny优先于allow)
      #Spring监控配置，说明请参考Druid Github Wiki，配置_Druid和Spring关联监控配置
      aop-patterns: "com.springboot.template.dao.*" # Spring监控AOP切入点,多个时用英文逗号分隔
