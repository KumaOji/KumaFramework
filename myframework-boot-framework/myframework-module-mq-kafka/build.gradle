plugins {
    id 'java-library'
}

description = 'Myframework mq-kafka模块'

dependencies {
    api project(':myframework-boot-framework:myframework-module-common')
    api project(':myframework-boot-framework:myframework-module-mq-common')
    api projectLibs.spring.kafka
    api projectLibs.spring.boot.starter.kafka
    api projectLibs.kafka.clients
    api projectLibs.kafka.streams
    api projectLibs.spring.messaging
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.cloud.context
    api projectLibs.guava
    api projectLibs.commons.collections4
    api projectLibs.jakarta.annotation.api
    api projectLibs.jackson.databind
    api projectLibs.hutool.core
}
