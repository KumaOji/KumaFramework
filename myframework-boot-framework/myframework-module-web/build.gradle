plugins {
    id 'java-library'
}

description = 'Myframework web模块'

dependencies {
    api project(':myframework-boot-framework:myframework-module-common')
    api project(':myframework-boot-framework:myframework-module-core')
    api project(':myframework-boot-framework:myframework-module-security-spring')
    api project(':myframework-boot-framework:myframework-module-ip2region')
    api project(':myframework-boot-framework:myframework-module-cache-redis')
    api projectLibs.hutool.core
    api projectLibs.jackson.databind
    api projectLibs.javax.json.api
    api projectLibs.fastjson2
    api projectLibs.swagger.annotations
    api projectLibs.commons.lang3
    api projectLibs.spring.boot.starter.web
    api projectLibs.spring.web
    compileOnly projectLibs.micrometer.tracing.api
    implementation projectLibs.sentinel.core
    implementation projectLibs.skywalking.apm.toolkit.trace
}
