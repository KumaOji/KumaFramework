spring:
  profiles:
    active: ${active}
  application:
    name: blog
  # JVM 与 Native 均可用；与 StartupSpringApplication#setKmcBanner 互补，避免镜像内仅 System Property 未参与 Banner 解析
  banner:
    location: classpath:banner/kmc-banner.txt
  main:
    # Native Image：保证 AOT 与运行时均按 Servlet Web 应用处理，避免未注册 ServletWebServerFactory
    web-application-type: servlet
  cloud:
    # Bootstrap 上下文无任何配置（无 bootstrap.yml / Config Server），
    # 禁用后 AOT 处理器可正常处理主 ApplicationContext；
    # 否则 Bootstrap 父上下文会拦截 AOT 处理，导致所有主 Bean 定义缺失。
    bootstrap:
      enabled: false
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: ${mysql_url}
          username: ${mysql_username}
          password: ${mysql_password}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${redis_host}
      port: ${redis_port}
      database: ${redis_database}
      jedis:
        pool:
          max-active: ${redis_jedis_pool_max_active}
          max-idle: ${redis_jedis_pool_max_idle}
          min-idle: ${redis_jedis_pool_min_idle}
