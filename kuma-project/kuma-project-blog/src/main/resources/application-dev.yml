server:
  port: 9000
  servlet:
    context-path: /api

spring:
  mvc:
    async:
      request-timeout: 600000  # 音乐流式播放超时 10 分钟（毫秒）
  main:
    lazy-initialization: true
    log-startup-info: false
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/blog_schema.sql
      data-locations: classpath:sql/blog_data.sql
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
  autoconfigure:
    exclude:
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    com.kuma.cloud.blog: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true

python:
  libreTranslate:
    # 是否在应用启动时自动启动 LibreTranslate 服务
    enabled: false
    # libretranslate 可执行文件路径（Windows 示例: E:\\python\\Python39\\Scripts\\libretranslate.exe）
    path: E:\python\Python39\Scripts\libretranslate.exe
    # 服务监听地址
    host: 0.0.0.0
    # 服务端口
    port: 5000
    # 仅加载指定语言模型，逗号分隔
    load-only: en,zh
    # 翻译线程数
    threads: 2
    # 是否自动下载/更新语言模型（首次启动建议设为 true）
    update-models: false

blog:
  tool:
    repkg:
      # RePKG 工具目录（存放 RePKG.exe 及依赖 DLL）
      tool-dir: E:\blog-resource\tool
      # RePKG 提取结果输出目录
      output-dir: E:\blog-resource\tool\output
  token-expire-seconds: 604800
  cookie-secure: false
  # 启动时重置 admin 密码为 admin123，解决 BCrypt 哈希不匹配问题。生产环境请设为 false
  reset-admin-password: true
  # Admin 初始密码（环境变量 ADMIN_INITIAL_PASSWORD 优先级最高）
  admin-initial-password: admin123
  # 音乐文件基础路径，建议使用绝对路径
  music:
    base-path: E:\blog-resource\music

kuma:
  boot:
    frp:
      enabled: false           # 本地开发一般不需要穿透，改为 true 即可开启
      server-addr: 8.134.147.122
      server-port: 7000
      token: 159841
      auto-restart: true
      restart-delay-ms: 3000
      max-restart-attempts: 5
      proxies:
        - name: blog-web
          type: tcp
          local-ip: 127.0.0.1
          local-port: 9000       # 与 server.port 一致
          remote-port: 9000

    core:
      enabled: true
      async:
        enabled: true
        core-pool-size: 5
        max-pool-size: 20
        thread-name-prefix: blog-async
    web:
      graceful-response:
        print-exception-in-global-advice: true
        origin-exception-using-detail-message: true
        response-style: 0
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
          - /**/music/*/stream
      filter:
        version: true
        trace: true
      request:
        enabled: true
        types:
          - LOGGER
      global-exception:
        enabled: true
    security:
      oauth2:
        endpoint:
          # 博客使用本地 Token 认证，不依赖 UAA；此处为占位配置，避免框架初始化时报错
          uaa-service-uri: http://127.0.0.1:33336
      ignore-url:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /doc.html
        - /webjars/**
        - /auth/**
        - /error
      authentication:
        expire: 86400
    cache:
      redis:
        enabled: true
    data:
      datasource:
        enabled: true
      mybatis:
        mybatis-plus:
          enabled: true
          interceptor:
            enabled: true
            pagination:
              enabled: true
    springdoc:
      enabled: true
      type: SERVICE
      title: Blog API 文档
      description: 博客系统 RESTful API 接口文档
      version: 1.0.0
      packages-to-scan:
        - com.kuma.cloud.blog
