server:
  port: 9000
  servlet:
    context-path: /api

spring:
  mvc:
    async:
      request-timeout: 600000  # 音乐流式播放超时 10 分钟（毫秒）
  main:
    lazy-initialization: true
    log-startup-info: false
  sql:
    init:
      mode: never
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
  autoconfigure:
    exclude:
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    com.kuma.cloud.blog: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true

ai-chat:
  base-url: https://api.openai.com
  api-key: ""
  model: gpt-4o-mini
  embedding:
    base-url: http://localhost:11434
    model: nomic-embed-text
  qdrant:
    host: localhost
    grpc-port: 6334
    http-port: 6333
    collection: blog-docs
    dimension: 768

blog:
  token-expire-seconds: 604800
  cookie-secure: false
  reset-admin-password: true
  admin-initial-password: admin123
  music:
    base-path: E:\blog-resource\music

jetcache:
  local:
    default:
      type: linkedhashmap
      keyConvertor: fastjson2
      limit: 100

kuma:
  boot:
    frp:
      enabled: false
      server-addr: 8.134.147.122
      server-port: 7000
      token: 159841
      auto-restart: true
      restart-delay-ms: 3000
      max-restart-attempts: 5
      proxies:
        - name: blog-web
          type: tcp
          local-ip: 127.0.0.1
          local-port: 9000       # 与 server.port 一致
          remote-port: 9000

    core:
      enabled: true
      async:
        enabled: true
        core-pool-size: 5
        max-pool-size: 20
        thread-name-prefix: blog-async
    web:
      graceful-response:
        print-exception-in-global-advice: true
        origin-exception-using-detail-message: true
        response-style: 0
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
          - /**/music/*/stream
          - /**/ai-chat/chat/stream
          - /**/ai-chat/rag/chat/stream
      filter:
        version: true
        trace: true
      request:
        enabled: true
        types:
          - LOGGER
      global-exception:
        enabled: true
    security:
      oauth2:
        endpoint:
          # 博客使用本地 Token 认证，不依赖 UAA；此处为占位配置，避免框架初始化时报错
          uaa-service-uri: http://127.0.0.1:33336
      ignore-url:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /doc.html
        - /webjars/**
        - /auth/**
        - /error
      authentication:
        expire: 86400
    cache:
      redis:
        enabled: true
    data:
      datasource:
        enabled: true
      mybatis:
        mybatis-plus:
          enabled: true
          interceptor:
            enabled: true
            pagination:
              enabled: true
    springdoc:
      enabled: true
      type: SERVICE
      title: Blog API 文档
      description: 博客系统 RESTful API 接口文档
      version: 1.0.0
      packages-to-scan:
        - com.kuma.cloud.blog
