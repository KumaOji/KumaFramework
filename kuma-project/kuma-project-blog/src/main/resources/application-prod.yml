server:
  port: 9000
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health  # 只暴露 health，不暴露 env/heapdump/loggers 等危险端点
  endpoint:
    health:
      show-details: never  # 不向外泄露数据库/redis 连接状态详情

spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  mvc:
    async:
      request-timeout: 600000
  main:
    lazy-initialization: true
    log-startup-info: false
  sql:
    init:
      mode: never  # 生产环境不自动执行 SQL
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
      acks: "1"
      retries: 3
  autoconfigure:
    exclude:
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 5
            maximum-pool-size: 20
            connection-timeout: 10000

logging:
  config: classpath:logback-spring.xml
  level:
    root: WARN
    com.kuma.boot: INFO
    com.kuma.cloud.blog: INFO
    org.springframework.security: WARN

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: false  # 生产环境关闭 API 文档
  swagger-ui:
    enabled: false

knife4j:
  enable: false



blog:
  token-expire-seconds: 86400
  cookie-secure: true  # HTTPS 强制
  # 生产环境不自动重置密码，密码从环境变量读取
  reset-admin-password: false
  # Admin 初始密码从环境变量读取，避免硬编码
  admin-initial-password: ${ADMIN_INITIAL_PASSWORD}
  # 生产环境使用绝对路径
  music:
    base-path: /data/music

kuma:
  boot:
    frp:
      enabled: ${FRP_ENABLED:false}
      server-addr: ${FRP_SERVER_ADDR:}
      server-port: ${FRP_SERVER_PORT:7000}
      auth:
        token: ${FRP_TOKEN:}
      auto-restart: true
      restart-delay-ms: 5000
      log:
        level: warn
        max-days: 3
      proxies:
        - name: blog-web
          type: tcp
          local-ip: 127.0.0.1
          local-port: 9000
          remote-port: ${FRP_REMOTE_PORT:9001}
    core:
      enabled: true
      async:
        enabled: true
        core-pool-size: 10
        max-pool-size: 50
        thread-name-prefix: blog-async
    web:
      graceful-response:
        print-exception-in-global-advice: false  # 生产环境不打印异常堆栈
        response-style: 0
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
          - /**/music/*/stream
      filter:
        version: true
        trace: true
      request:
        enabled: true
        types:
          - LOGGER
      global-exception:
        enabled: true
    security:
      oauth2:
        endpoint:
          uaa-service-uri: ${UAA_SERVICE_URI:http://uaa:8080}
      ignore-url:
        - /v3/api-docs/**
        - /auth/**
        - /error
      authentication:
        expire: 86400
    cache:
      redis:
        enabled: true
    data:
      datasource:
        enabled: true
      mybatis:
        mybatis-plus:
          enabled: true
          interceptor:
            enabled: true
            pagination:
              enabled: true
    springdoc:
      enabled: false
