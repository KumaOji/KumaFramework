server:
  port: 9000
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 400
      min-spare: 20
    accept-count: 200
    connection-timeout: 20000

spring:
  mvc:
    async:
      request-timeout: 600000
  main:
    lazy-initialization: true
    log-startup-info: false
  sql:
    init:
      mode: never
  autoconfigure:
    exclude:
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 5
            maximum-pool-size: 30
            connection-timeout: 10000
            idle-timeout: 600000
            max-lifetime: 1800000

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    com.kuma.cloud.blog: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

knife4j:
  enable: true

blog:
  token-expire-seconds: 604800
  cookie-secure: true
  reset-admin-password: true
  admin-initial-password: admin123
  music:
    base-path: /data/music

jetcache:
  stat-interval-minutes: 15
  local:
    default:
      type: linkedhashmap
      keyConvertor: fastjson2
      limit: 2000

kuma:
  boot:
    ai:
      base-url: ${AI_CHAT_BASE_URL}
      api-key: ${AI_CHAT_API_KEY}
      model: ${AI_CHAT_MODEL:gpt-4o-mini}
      embedding:
        base-url: http://blog-ollama:11434/v1
        model: nomic-embed-text
      qdrant:
        host: blog-qdrant
        grpc-port: 6334
        http-port: 6333
        collection: blog-docs
        dimension: 768
    frp:
      enabled: false
      server-addr: 8.134.147.122
      server-port: 7000
      token: 159841
      auto-restart: true
      restart-delay-ms: 3000
      max-restart-attempts: 5
      proxies:
        - name: blog-web
          type: tcp
          local-ip: 127.0.0.1
          local-port: 9000       # 与 server.port 一致
          remote-port: 9000

    core:
      enabled: true
      async:
        enabled: true
        core-pool-size: 10
        max-pool-size: 50
        thread-name-prefix: blog-async
    web:
      graceful-response:
        print-exception-in-global-advice: true
        origin-exception-using-detail-message: true
        response-style: 0
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
          - /**/music/*/stream
          - /**/ai-chat/chat/stream
          - /**/ai-chat/rag/chat/stream
          - /**/ai-chat/agent/chat/stream
          - /**/ai-chat/selection/ask/stream
      filter:
        version: true
        trace: true
      request:
        enabled: true
        types:
          - LOGGER
      global-exception:
        enabled: true
    security:
      oauth2:
        endpoint:
          # 博客使用本地 Token 认证，不依赖 UAA；此处为占位配置，避免框架初始化时报错
          uaa-service-uri: http://127.0.0.1:33336
      ignore-url:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /doc.html
        - /webjars/**
        - /auth/**
        - /error
      authentication:
        expire: 86400
    cache:
      redis:
        enabled: true
    data:
      datasource:
        enabled: true
      mybatis:
        mybatis-plus:
          enabled: true
          interceptor:
            enabled: true
            pagination:
              enabled: true
    springdoc:
      enabled: false
      type: SERVICE
      title: Blog API 文档
      description: 博客系统 RESTful API 接口文档
      version: 1.0.0
      packages-to-scan:
        - com.kuma.cloud.blog

delay:
  thread:
    core: 2
    max: 10
    queue: 100
    keepAlive: 60
