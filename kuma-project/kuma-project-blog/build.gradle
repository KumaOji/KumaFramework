plugins {
    alias(projectLibs.plugins.springboot)
    alias(projectLibs.plugins.spring.dependency.management)
    alias(projectLibs.plugins.gradle.git.properties)   // com.gorylenko.gradle-git-properties
}

description = '博客系统 Demo —— 完整业务场景，含 Spring Security（OAuth2）/ MySQL / Redis / MyBatis-Plus / SpringDoc，展示框架在真实项目中的集成方式'

def springBootVersion = projectLibs.versions.springboot.get()
dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
    }
}

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-web')
    api project(':kuma-boot-framework:kuma-boot-starter-springdoc')
    api project(':kuma-boot-framework:kuma-boot-starter-data-datasource')
    api project(':kuma-boot-framework:kuma-boot-starter-data-mybatis')
    api project(':kuma-boot-framework:kuma-boot-starter-cache-redis')
    api project(':kuma-boot-framework:kuma-boot-starter-security-spring')
    api project(':kuma-boot-framework:kuma-boot-starter-totp')
    api(project(':kuma-cloud-framework:kuma-cloud-starter-bootstrap')) {
        exclude group: 'org.springframework.cloud', module: 'spring-cloud-starter-loadbalancer'
    }
    api project(':kuma-boot-framework:kuma-boot-starter-frp')

    api projectLibs.hutool.core
    api projectLibs.spring.boot.starter.web
    api projectLibs.spring.boot.starter.security
    api projectLibs.spring.doc.webmvc

    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok

    runtimeOnly projectLibs.mysql
}

def blogMysqlUrl                = project.findProperty('mysql.url')                   ?: ''
def blogMysqlUsername           = project.findProperty('mysql.username')              ?: ''
def blogMysqlPassword           = project.findProperty('mysql.password')              ?: ''
def blogRedisHost               = project.findProperty('redis.host')                  ?: ''
def blogRedisPort               = project.findProperty('redis.port')                  ?: ''
def blogRedisDatabase           = project.findProperty('redis.database')              ?: ''
def blogRedisJedisPoolMaxActive = project.findProperty('redis.jedis.pool.max-active') ?: ''
def blogRedisJedisPoolMaxIdle   = project.findProperty('redis.jedis.pool.max-idle')   ?: ''
def blogRedisJedisPoolMinIdle   = project.findProperty('redis.jedis.pool.min-idle')   ?: ''

processResources {
    filesMatching('**/application.yml') {
        expand(
                active                     : 'dev',
                mysql_url                  : blogMysqlUrl,
                mysql_username             : blogMysqlUsername,
                mysql_password             : blogMysqlPassword,
                redis_host                 : blogRedisHost,
                redis_port                 : blogRedisPort,
                redis_database             : blogRedisDatabase,
                redis_jedis_pool_max_active: blogRedisJedisPoolMaxActive,
                redis_jedis_pool_max_idle  : blogRedisJedisPoolMaxIdle,
                redis_jedis_pool_min_idle  : blogRedisJedisPoolMinIdle
        )
    }
}

// Git 属性注入：将 branch / commit id / 构建时间写入 git.properties
// 启动后可通过 GET /actuator/info 查看当前部署的 commit 信息
apply from: rootProject.file('gradle/git.gradle')

bootJar {
    archiveBaseName = 'blog'
}
