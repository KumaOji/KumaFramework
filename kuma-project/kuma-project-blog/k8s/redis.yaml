apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-redis
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-redis
  template:
    metadata:
      labels:
        app: blog-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          hostPath:
            path: /data/redis
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: blog-redis
  namespace: blog
spec:
  selector:
    app: blog-redis
  ports:
    - port: 6379
      targetPort: 6379
