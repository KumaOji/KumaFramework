apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # ── 端口 ────────────────────────────────────────────────────────
    ports:
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
        expose:
          default: true
        # HTTP 全部重定向到 HTTPS
        redirectTo:
          port: websecure
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
        expose:
          default: true
        tls:
          enabled: true
      aiui:
        port: 8081
        exposedPort: 8081
        protocol: TCP
        expose:
          default: true

    # ── Let's Encrypt ACME ──────────────────────────────────────────
    certResolvers:
      letsencrypt:
        email: "15346602014@163.com"
        tlsChallenge: true
        storage: /data/acme.json

    # ── 持久化 acme.json（证书存储） ─────────────────────────────────
    persistence:
      enabled: true
      storageClass: "local-path"   # k3s 默认 StorageClass
      accessMode: ReadWriteOnce
      size: 128Mi
      path: /data

    # ── 兜底：用 CLI 参数强制注入 certResolver ────────────────────────
    additionalArguments:
      - "--certificatesResolvers.letsencrypt.acme.email=15346602014@163.com"
      - "--certificatesResolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesResolvers.letsencrypt.acme.tlsChallenge=true"
