apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-ollama
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-ollama
  template:
    metadata:
      labels:
        app: blog-ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          hostPath:
            path: /data/ollama
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: blog-ollama
  namespace: blog
spec:
  selector:
    app: blog-ollama
  ports:
    - port: 11434
      targetPort: 11434
