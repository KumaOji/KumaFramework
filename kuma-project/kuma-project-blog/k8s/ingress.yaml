apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-fronted
  namespace: blog
  annotations:
    # 使用 letsencrypt certResolver 自动签发证书
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  tls:
    - hosts:
        - blog.kumacloud.top
  rules:
    - host: blog.kumacloud.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blog-fronted
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: blog-ai-ui
  namespace: blog
spec:
  entryPoints:
    - aiui
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: blog-ai-ui
          port: 8080
