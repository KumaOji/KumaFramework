apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-fronted
  namespace: blog
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blog-fronted
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: blog-ai-ui
  namespace: blog
spec:
  entryPoints:
    - aiui
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: blog-ai-ui
          port: 8080
