# Banner：须与 core 一致 —— classpath:banner/kmc-banner.txt（StartupSpringApplication.DEFAULT_BANNER_LOCATION，
# kuma-boot-starter-core 资源）。main 中使用 StartupSpringApplication#setKmcBanner() 会先写入同名 System 属性，
# 此处再在 YAML 声明，便于 AOT/processAot 等非标准入口下 Environment 仍能加载 ResourceBanner。
spring:
  profiles:
    active: ${active}
  application:
    name: kuma-cloud-graalvm-test
  banner:
    location: classpath:banner/kmc-banner.txt
  main:
    web-application-type: servlet
  mvc:
    # Native：FormContentFilter 会拉起 Jackson Module 扫描，误入 JSR353Module → Glassfish JsonProviderImpl
    # 在 Substrate VM 中与 Class.newInstance() 链不兼容；本模块为 REST/JSON Demo，禁用表单 PUT/PATCH 模拟即可。
    formcontent:
      filter:
        enabled: false
  cloud:
    bootstrap:
      enabled: false
  # 排除 Druid（与 @SpringBootApplication 一致）；Tomcat Web 容器由 Spring Boot Starter Web 引入
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: ${mysql_url}
          username: ${mysql_username}
          password: ${mysql_password}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${redis_host}
      port: ${redis_port}
      database: ${redis_database}
      jedis:
        pool:
          max-active: ${redis_jedis_pool_max_active}
          max-idle: ${redis_jedis_pool_max_idle}
          min-idle: ${redis_jedis_pool_min_idle}

management:
  endpoints:
    enabled-by-default: false
