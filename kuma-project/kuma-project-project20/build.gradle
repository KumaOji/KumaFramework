plugins {
    alias(projectLibs.plugins.springboot)
    alias(projectLibs.plugins.spring.dependency.management)
    id 'com.google.protobuf' version '0.9.4'
}

description = 'AI Agent gRPC 客户端示例 —— 通过 gRPC 调用 kuma-ai-agent Python 服务（Chat / ChatStream / Threads / Config / Health）'

def grpcVersion     = '1.76.0'
def protobufVersion = '3.25.5'

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${projectLibs.versions.springboot.get()}"
    }
}

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-web')
    api project(':kuma-boot-framework:kuma-boot-starter-grpc')

    // Protobuf 编译依赖（protoc-gen-grpc-java 生成代码依赖 grpc-protobuf）
    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    // Protobuf JSON 序列化（JsonFormat.printer 用于返回 JSON 响应）
    implementation "com.google.protobuf:protobuf-java-util:${protobufVersion}"

    // gRPC 生成代码依赖的 javax.annotation.Generated
    compileOnly 'javax.annotation:javax.annotation-api:1.3.2'

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}

// ── Protobuf 代码生成 ─────────────────────────────────────────────────────────
protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

processResources {
    filesMatching('**/application.yml') {
        expand(active: 'dev')
    }
}

bootJar {
    archiveBaseName = 'project20'
}

bootRun {
    jvmArgs += ['--sun-misc-Unsafe-memory-access=allow']
}
