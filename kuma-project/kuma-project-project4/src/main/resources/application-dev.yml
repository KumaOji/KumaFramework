server:
  port: 30001
  shutdown: graceful
  http2:
    enabled: true
  undertow:
    buffer-size: 2048
    direct-buffers: true
    max-cookies: 200
    max-headers: 100
    threads:
      io: 16
      worker: 256
    accesslog:
      dir: ${user.home}/logs/undertow/${spring.application.name}
      enabled: true
      pattern: "combined"
      prefix: access_log
      suffix: .log
  servlet:
    application-display-name: ${spring.application.name}

spring:
  main:
    lazy-initialization: true
    log-startup-info: false
  threads:
    virtual:
      # Java 25 虚拟线程：Undertow/MVC 请求、@Async、@Scheduled 均在虚拟线程上运行
      enabled: false
  cache:
    type: none
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
  mvc:
    servlet:
      load-on-startup: -1
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: yyyy-MM-dd
      time: HH:mm:ss
  autoconfigure:
    exclude:
      # knife4j 与 springdoc 3.0 兼容问题，使用 @EnableKnife4j 替代
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
      # Druid的springboot4暂未支持
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
      # Nacos 注册/配置中心（无 Nacos Server 时禁用）
      - com.alibaba.cloud.nacos.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryClientConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosServiceDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
      # Sentinel（无 Sentinel Dashboard 时禁用）
      - com.alibaba.cloud.sentinel.SentinelWebAutoConfiguration
      - com.alibaba.cloud.sentinel.custom.SentinelAutoConfiguration
      # RocketMQ Stream（无 RocketMQ Broker 时禁用，也可通过 rocketmq.enabled=false 控制）
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration
      # EasyES（无 ES 时禁用）
      - org.dromara.easyes.spring.config.EasyEsConfiguration
      - org.dromara.easyes.starter.config.GeneratorConfiguration
      # MongoDB（Spring Boot 4）：classpath 有 spring-boot-starter-data-mongodb 时即会装配 MongoClient。
      # 未配置 spring.data.mongodb.uri 时仍会用默认 host=localhost、port=27017，与是否配置 uri、kuma.boot.data.mongodb.enabled 无关。
      # 本地不使用 Mongo 时排除下列类；启用 Kuma Mongo（kuma.boot.data.mongodb.enabled=true）时必须删除本段并配置 uri，
      # 否则没有 Spring Data 的 MongoDatabaseFactory（starter 已修复为在未排除时正常装配）。
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
      - org.springframework.boot.mongodb.autoconfigure.metrics.MongoMetricsAutoConfiguration
      - org.springframework.boot.mongodb.autoconfigure.health.MongoHealthContributorAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration
  datasource:
    dynamic:
      lazy: true                 # 数据源懒初始化，首次 DB 操作时才建连接池（省 ~900ms）
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
        postgresql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
        domain:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 5
            connection-timeout: 10000
  integration:
    management:
      default-logging-enabled: false   # 关闭 SI 默认 logging，减少 integrationEvaluationContext 初始化开销
    endpoint:
      enabled: false
  cloud:
    stream:
      banner:
        enabled: false
      # ── Kafka Stream Binder（Spring Cloud Stream over Kafka）──────────
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
      # ── RocketMQ / RabbitMQ binder 占位（本地无 Broker 暂留空）───────
      rocketmq:
        binder:
          name-server:
      rabbit:
        binder:
          admin-addresses:
    inetutils:
      timeout-value: 1000        # hostname 解析超时 1s（默认可能等待 5~10s）
      prefer-ip-address: true    # 直接使用 IP，跳过 hostname 反解
    nacos:
      discovery:
        enabled: false
        register-enabled: false
        server-addr: 127.0.0.1:8848
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
    service-registry:
      auto-registration:
        enabled: false
    gateway:
      enabled: false
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      bootstrap-servers: localhost:9092
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-commit-interval: 1S
    listener:
      concurrency: 5
      ack-mode: manual_immediate
      missing-topics-fatal: false
  # ── MongoDB：kuma.boot.data.mongodb.enabled 只控制 Kuma 封装；Spring Boot 仍会因 starter 创建 MongoClient。
  # 未配 uri 时等价于连 localhost:27017。本地不用 Mongo 时在 spring.autoconfigure.exclude 中排除 Boot 的 Mongo 自动配置（见上文）。
  # 使用 Mongo 时：删除上述 exclude、启用 kuma.boot.data.mongodb.enabled，并取消注释 uri。
  data:
    mongodb:
      # uri: mongodb://localhost:27017/${spring.application.name}
      auto-index-creation: false

  # ── JPA / Hibernate（kuma-boot-starter-data-jpa）─────────────────────
  jpa:
    open-in-view: false          # 关闭 OSIV，避免 N+1 延迟加载风险
    show-sql: false              # SQL 打印由 kuma.boot.data.jpa.show-sql 统一控制
    hibernate:
      ddl-auto: none             # 生产/测试均不自动建表，由 Flyway/Liquibase 或手动 DDL 管理

  # ── Elasticsearch（kuma.boot.data.elasticsearch.enabled=false 时保持默认）──
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 3s
    socket-timeout: 30s
  dynamic:
    tp:
      enabled: false

  # ── Mail（已引入 spring-boot-starter-mail，本地无 SMTP 时保持注释）──
  #mail:
  #  host: smtp.qq.com
  #  port: 465
  #  username: ${MAIL_USERNAME:your_email@qq.com}
  #  password: ${MAIL_PASSWORD:your_auth_code}
  #  properties:
  #    mail:
  #      smtp:
  #        auth: true
  #        starttls:
  #          enable: true
  #          required: true
  #        socketFactory:
  #          class: javax.net.ssl.SSLSocketFactory

# Apollo 配置中心（本地无 Apollo Server 时保持 false）
apollo:
  bootstrap:
    enabled: false
    namespaces: application.yml
  meta: http://localhost:8080

# DynamicTP 动态线程池（kuma.boot.threadpool.enabled=false 时无需采集/报警配置）

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    com.kuma.cloud.project4: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

# Atlas 日志拦截器（web starter 内置，默认 true + matchIfMissing，必须显式关闭）
atlas:
  log:
    enabled: false

# HttpExchange 客户端（web starter 内置，默认 true + matchIfMissing，必须显式关闭）
http-exchange:
  enabled: false

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: false

knife4j:
  enable: true

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: "health,info,kmc,kmchealth,kmcstartup,kmcrequestmappings,auditevents,prometheus,metrics"
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  health:
    kmc:
      enabled: false
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      jvm: true
      process: true
      system: true

info:
  app:
    name: project4
    description: "框架全量功能演示项目"
    version: "1.0.0"

# 框架配置（前缀 kuma.*）
kuma:
  # ── kuma-cloud-starter-frp ────────────────────────────────────
  frp:
    enabled: false           # 本地开发一般不需要穿透，改为 true 即可开启
    server-addr: your-frps.example.com
    server-port: 7000
    auth:
      token: your-token
    auto-restart: true
    restart-delay-ms: 3000
    log:
      level: info
      max-days: 3
    proxies:
      - name: blog-web
        type: tcp
        local-ip: 127.0.0.1
        local-port: 9000       # 与 server.port 一致
        remote-port: 9001
  # ── kuma-cloud-starter-jdbcpool ────────────────────────────────────
  # 注意：项目已有 spring.datasource.dynamic，jdbcpool DataSource 不会自动注册（@ConditionalOnMissingBean）
  # 如需单独使用，可排除 dynamic 数据源，或直接通过 JdbcPoolBs 手动构建
  jdbcpool:
    url: ${mysql_url}
    username: ${mysql_username}
    password: ${mysql_password}
    min-size: 5
    max-size: 50
    max-wait-mills: 30000
    valid-query: "select 1"
    test-on-borrow: false
    test-on-return: false
    test-on-idle: true
    test-on-idle-interval-seconds: 60
  # ── kuma-cloud-starter-cache ───────────────────────────────────────
  cache:
    size: 1024
    evict: lru
    persist:
      type: none
  # ── kuma-cloud-starter-netty ───────────────────────────────────────
  # 激活条件：需向容器注册 ChannelInitializer<SocketChannel> Bean 才会启动服务器
  netty:
    port: 8888
    boss-threads: 1
    worker-threads: 0
    backlog: 128
    reader-idle-seconds: 0
    logging-enabled: false
  # ── kuma-cloud-starter-kmc ─────────────────────────────────────────
  cloud:
    kmc:
      discovery:
        enabled: false
      router:
        enabled: false
      circuitbreaker:
        enabled: false
      ratelimit:
        enabled: false
      config:
        enabled: false
    # ── kuma-cloud-starter-alibaba ─────────────────────────────────────
    alibaba:
      nacos:
        enabled: false
      sentinel:
        enabled: false
      seata:
        enabled: false
    # ── kuma-cloud-starter-stream ──────────────────────────────────────
    stream:
      enabled: false
    # ── kuma-cloud-starter-gateway ─────────────────────────────────────
    gateway:
      enabled: false      # project4 为 MVC/Servlet 应用；独立 Gateway 服务时开启
      cors:
        enabled: true
        allowed-origins:
          - "*"
        allowed-methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
          - PATCH
          - HEAD
        allowed-headers:
          - "*"
        allow-credentials: false
        max-age: 3600
      auth:
        enabled: false    # 开启后所有非白名单请求必须携带 Authorization 头
        token-header: Authorization
        white-list:
          - /actuator/**
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
      log:
        enabled: true     # 请求日志全局过滤器，默认开启
  boot:
    core:
      enabled: true
      env: DEV          # 核心环境标识（DEV/TEST/PRE/PRO/KUBERNETES/DOCKER），无默认值
      collect-hook-enabled: false
      context-restart-enabled: false
      async:
        enabled: true
        virtual-threads: false
        core-pool-size: 10
        max-pool-size: 50
        queue-capacity: 10000
        keep-alive-seconds: 300
        allow-core-thread-time-out: false
        wait-for-tasks-to-complete-on-shutdown: true
        await-termination-seconds: 5
        thread-name-prefix: project4-async
        check-health: true
    web:
      graceful-response:
        print-exception-in-global-advice: false
        response-style: 0
        default-success-code: "0000"
        default-success-msg: success
        default-error-code: "-1"
        default-error-msg: failed
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
      filter:
        version: false
        tenant: false
        trace: false
        web-context: false
        report: false
        ping: false
      interceptor:
        doubt-api: true           # 开启可疑 API 拦截（内存增长阈值告警）
        doubt-api-threshold: 3145728  # 3MB，超过视为可疑
        header: true              # 开启请求头拦截器
      request:
        enabled: false
        types:
          - LOGGER
      i18n:
        fallback-language-tag: zh-CN
        use-code-as-default-message: true
      global-exception:
        enabled: true
        types:
          - LOGGER
        ignore-child: true
        time: 300
        max: 5
        length: 3000
    security:
      oauth2:
        endpoint:
          uaa-service-uri: http://127.0.0.1:33336
      justauth:
        enabled: false
      ignore-url:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /doc.html
        - /webjars/**
        - /login/**
        - /error
      authentication:
        expire: 7200
        refresh-expire: 28800
        allowed-clock-skew-seconds: 60
    cache:
      redis:
        enabled: false
        cache-manager:
          enabled: false
      caffeine:
        enabled: false
      jetcache:
        enabled: false
        desensitization: true
        clear-remote-on-exit: false
        allow-null-values: true
        separator: "-"
    data:
      datasource:
        enabled: false
        health-enabled: false
      mybatis:
        enabled: false
        snow-flake-id-generator: false  # 是否使用雪花 ID 生成器替换 MyBatis-Plus 内置 ID
        # entity-package-path: com.kuma.cloud.project4.biz.model.entity
        mybatis-plus:
          enabled: false
          interceptor:
            enabled: false
            pagination:
              enabled: false
              db-type: MYSQL
              overflow: true
              max-limit: 1000
              optimize-join: true
            block-attack:
              enabled: false
            illegal-sql:
              enabled: false
            optimistic-locker:
              enabled: false
            data-scope:
              enabled: false
            multi-tenant:
              enabled: false
              column: tenant_id
            data-change:
              enabled: false
            slow-query:
              enabled: false
              slow-sql-threshold-ms: 6000
      jpa:
        enabled: false
        show-sql: false           # dev 阶段关闭，调试时可改为 true
        generate-ddl: false       # 不自动 DDL，由 spring.jpa.hibernate.ddl-auto 接管
        format-sql: false
        highlight-sql: false
        database: MYSQL
        dialect: org.hibernate.dialect.MySQLDialect
        time-zone: Asia/Shanghai
        packages: com.kuma.cloud.project4.biz.model.entity
        tenant:
          enabled: false          # 暂不启用多租户，按需开启
      mongodb:
        enabled: false
        print: false
        slow-query: false
        slow-time: 1000
      elasticsearch:
        enabled: false
      p6spy:
        enabled: false
      shardingsphere:
        enabled: false
    office:
      enabled: false
    mq:
      enabled: false
      kafka:
        enabled: false
    springdoc:
      enabled: false
      type: SERVICE
      title: Project4 API 文档
      description: RESTful API 接口文档
      version: 1.0.0
      openapi: "3.0.0"
      paths-to-match:
        - /**
      paths-to-exclude:
        - /actuator/**
      packages-to-scan:
        - com.kuma.cloud.project4
      license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0.html
    ip2region:
      enabled: false
    idempotent:
      enabled: false
    lock:
      enabled: false
      type: LOCAL
    ratelimit:
      enabled: false
    dingtalk:
      enabled: false
      project-id: project4-demo
      dingers:
        DINGTALK:
          token-id: ${DINGTALK_TOKEN_ID:demo_token_placeholder}
          secret: ${DINGTALK_SECRET:demo_secret_placeholder}
    captcha:
      enabled: false
    seata:
      enabled: false
    totp:
      secret:
        length: 32
      code:
        length: 6
      time:
        period: 30
        discrepancy: 1
    sentinel:
      enabled: false
    retry:
      enabled: false
    canal:
      enabled: false
      instances: {}
    eventbus:
      enabled: false
    idgenerator:
      enabled: false
      type: REDIS
    third-client:
      forest:
        enabled: false
      retrofit:
        enabled: false
    threadpool:
      enabled: false
    useragent:
      enabled: false
    encrypt:
      enabled: false
    crypto:
      enabled: false
    sign:
      enabled: false
      # key: your-sign-secret-key  # 签名密钥，启用时必须配置
      # ignore: [token, sign, dataSecret]  # 不参与签名的字段
      encrypt:
        body:
          # aes-key: your-aes-key   # 请求体 AES 加密密钥
          # des-key: your-des-key   # 请求体 DES 加密密钥
          encoding: UTF-8
    openapi:
      enabled: false
      client: false   # 是否作为 OpenAPI 客户端
      server: false   # 是否作为 OpenAPI 服务端
    sms:
      enabled: false
      # 启用时必须指定服务商：ALIBABA / TENCENT / HUAWEI / YUNPIAN 等
      # type: ALIBABA
      load-balancer-type: Random
      # reg: 手机号正则（可选，使用默认正则时无需配置）
      async:
        enable: true
      verification-code:
        repository: REDIS
        expiration-time: 300000   # 验证码有效期（ms）
        retry-interval-time: 60000  # 重发间隔（ms）
        code-length: 6
        delete-by-verify-succeed: true
    oss:
      enabled: false
      # 启用时需指定存储平台：MINIO / ALIYUN / TENCENT / HUAWEI / LOCAL 等
      # type: MINIO
      platform:
        minio:
          url: http://localhost:9000
          bucket-name: ${spring.application.name}
          access-key: ${MINIO_ACCESS_KEY:minioadmin}
          secret-key: ${MINIO_SECRET_KEY:minioadmin}
    actuator:
      managedresource:
        enabled: false
    prometheus:
      enabled: false
    # ── kuma-boot-starter-grpc ─────────────────────────────────────────
    grpc:
      enabled: false
      server:
        # port: 9090              # 启用时必须配置，无默认值
        trace-id-key: TRACE_ID
        message-size: 512MB
        keep-alive-time: 7200000  # ms，默认 2h
        keep-alive-timeout: 20000 # ms，默认 20s
      client:
        # host: localhost         # 启用时必须配置，无默认值
        port: 80
        trace-id-key: TRACE_ID
        use-plaintext: false
        disable-ssl: false
        enable-retry: true
        enable-keep-alive: true
        keep-alive-time: 1800000  # ms，默认 30min
        keep-alive-timeout: 2000  # ms，默认 2s
    # ── kuma-boot-starter-monitor ──────────────────────────────────────
    monitor:
      enabled: false
      time-span: 100  # 接口耗时监控阈值（ms），超过此值记录告警
    # ── kuma-boot-starter-xss ──────────────────────────────────────────
    xss:
      enabled: false
      mode: clear
      patterns:
        - /*
    # ── kuma-boot-starter-websocket ───────────────────────────────────
    websocket:
      original:
        enabled: false
      spring:
        enabled: false
        path: /ws
        with-sockjs: false
      stomp:
        enabled: false
        endpoint: stomp/ws
    # ── kuma-boot-starter-tracer（Micrometer Tracing / OTLP）──────────
    micrometer:
      enabled: false
    otlp:
      enabled: false
    # ── kuma-boot-starter-skywalking ──────────────────────────────────
    skywalking:
      enabled: false
    # ── kuma-boot-starter-metrics ─────────────────────────────────────
    metrics:
      enabled: false
      druid:
        enabled: false
      sentinel:
        enabled: false
      undertow:
        enabled: false
    # ── kuma-boot-starter-elk ─────────────────────────────────────────
    elk:
      enabled: false
      app-name: ${spring.application.name}
      spring-app-name: ${spring.application.name}
      destinations:
        - 127.0.0.1:4560
    # ── kuma-boot-starter-logger ──────────────────────────────────────
    logger:
      enabled: false
      logging:
        console:
          enabled: true          # 控制台日志（默认开启）
          close-after-start: false
        files:
          enabled: false         # 文件滚动日志
          use-json-format: false
        logstash:
          enabled: false
          destinations: 127.0.0.1:5000
        loki:
          enabled: false
          http-url: http://localhost:3100/loki/api/v1/push
    # ── kuma-boot-starter-translation ────────────────────────────────
    translation:
      enabled: false
    # ── kuma-boot-starter-sensitive ───────────────────────────────────
    sensitive:
      enabled: false
      sensitive-level: 0  # 脱敏级别（默认 0，级别越高脱敏越严格）
    # ── kuma-boot-starter-statemachine ───────────────────────────────
    statemachine:
      enabled: false
    # ── kuma-boot-starter-flowengine ─────────────────────────────────
    flowengine:
      enabled: false
      # flow-conf-location: classpath:flow/  # 流程配置文件路径，启用时必须配置
      retryable: false  # 节点执行失败是否自动重试
    # ── kuma-boot-starter-mail ─────────────────────────────────────────
    mail:
      enabled: false
    # ── kuma-boot-starter-mqtt ────────────────────────────────────────
    mqtt:
      enabled: false
      # ── Paho MQTT v5 直连客户端（kuma.boot.mqtt.*）────────────────
      # server-urls:
      #   - tcp://localhost:1883
      # client-id: project4-mqtt-client
      # username:
      # password:
      # keep-alive-interval: 60s
      # automatic-reconnect: true
      # ── Spring Integration MQTT（kuma.boot.mqtt.spring.broker.*）──
      spring:
        broker:
          enabled: false
          configs:
            default:
              uri: tcp://localhost:1883
              # username:
              # password:
              subscribe-qos: 0
              send-qos: 1
              automatic-reconnect: true
    # ── kuma-boot-starter-job-xxl ────────────────────────────────────
    job:
      xxl:
        enabled: false
        admin:
          addresses: http://127.0.0.1:8080/xxl-job-admin
        executor:
          app-name: ${spring.application.name}
          ip:
          port: 9999
          log-path: ${user.home}/logs/${spring.application.name}/applogs/xxl-job/jobhandler
          log-retention-days: 30
    # ── kuma-boot-starter-oss-minio ──────────────────────────────────


# Seata 分布式事务（本地无 Seata Server 时保持 enabled: false）
# kuma.boot.seata.enabled 控制 kuma wrapper（XID 传播过滤器 + undo_log 自动建表）

seata:
  enabled: false
  application-id: ${spring.application.name}
  # 事务分组名，需与 Seata Server 的 vgroup-mapping 保持一致
  tx-service-group: project4_tx_group
  # 注册中心：使用 File 模式（KmcRegistryProvider @LoadLevel File），本地直连 Seata Server
  registry:
    type: file
    file:
      name: file.conf
  # 配置中心：使用 kmc 模式（KmcConfiguration），由框架 SPI 提供，无需额外配置
  config:
    type: file
    file:
      name: file.conf
  service:
    vgroup-mapping:
      # 事务分组 → Seata Server 集群名（默认 default）
      project4_tx_group: default
    grouplist:
      # Seata Server 地址（TC）
      default: 127.0.0.1:8091
    disable-global-transaction: false
  client:
    rm:
      # undo_log 序列化方式（jackson / kryo / fst）
      undo-log-serialization: jackson
      # undo_log 数据压缩（zip / gzip / none）
      undo-log-compress-alg: zip
      # undo_log 压缩阈值（字节），超过此值才压缩
      undo-log-compress-threshold: 64000
      report-retry-count: 5
      table-meta-check-enable: false
    tm:
      commit-retry-count: 5
      rollback-retry-count: 5
      default-global-transaction-timeout: 60000
  # AT 模式异步提交缓冲（默认关闭）
  store:
    mode: file

# RocketMQ（本地无 Broker，通过 ImportFilter 禁用）
rocketmq:
  enabled: false

# MyBatis
mybatis:
  # 真实 SQL 日志
  actual:
    sql:
      show-sql: false
      show-method: false
      show-elapsed: false
      show-rows: false
  # 多租户
  tenant:
    config:
      enable: false
      tenant-id-column: tenant_id
      db-type: MYSQL

# 延迟线程池
delay:
  thread:
    core: 5
    max: 10
    queue: 100
    keepAlive: 60
