server:
  port: 30001
  shutdown: graceful
  http2:
    enabled: true
  undertow:
    buffer-size: 2048
    direct-buffers: true
    max-cookies: 200
    max-headers: 100
    threads:
      io: 16
      worker: 256
    accesslog:
      dir: ${user.home}/logs/undertow/${spring.application.name}
      enabled: true
      pattern: "combined"
      prefix: access_log
      suffix: .log
  servlet:
    application-display-name: ${spring.application.name}

spring:
  main:
    lazy-initialization: true
    log-startup-info: false
  threads:
    virtual:
      # Java 25 虚拟线程：Undertow/MVC 请求、@Async、@Scheduled 均在虚拟线程上运行
      enabled: false
  cache:
    type: none
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
  mvc:
    servlet:
      load-on-startup: -1
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: yyyy-MM-dd
      time: HH:mm:ss
  autoconfigure:
    exclude:
      # knife4j 与 springdoc 3.0 兼容问题，使用 @EnableKnife4j 替代
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
      # Druid的springboot4暂未支持
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
      # Nacos 注册/配置中心（无 Nacos Server 时禁用）
      - com.alibaba.cloud.nacos.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryClientConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosServiceDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
      # Sentinel（无 Sentinel Dashboard 时禁用）
      - com.alibaba.cloud.sentinel.SentinelWebAutoConfiguration
      - com.alibaba.cloud.sentinel.custom.SentinelAutoConfiguration
      # RocketMQ Stream（无 RocketMQ Broker 时禁用，也可通过 rocketmq.enabled=false 控制）
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration
  datasource:
    dynamic:
      lazy: true                 # 数据源懒初始化，首次 DB 操作时才建连接池（省 ~900ms）
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
        postgresql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000
  integration:
    management:
      default-logging-enabled: false   # 关闭 SI 默认 logging，减少 integrationEvaluationContext 初始化开销
    endpoint:
      enabled: false
  cloud:
    stream:
      banner:
        enabled: false
      # ── Kafka Stream Binder（Spring Cloud Stream over Kafka）──────────
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
      # ── RocketMQ / RabbitMQ binder 占位（本地无 Broker 暂留空）───────
      rocketmq:
        binder:
          name-server:
      rabbit:
        binder:
          admin-addresses:
    inetutils:
      timeout-value: 1000        # hostname 解析超时 1s（默认可能等待 5~10s）
      prefer-ip-address: true    # 直接使用 IP，跳过 hostname 反解
    nacos:
      discovery:
        enabled: false
        register-enabled: false
        server-addr: 127.0.0.1:8848
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
    service-registry:
      auto-registration:
        enabled: false
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      acks: "1"
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      bootstrap-servers: localhost:9092
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-commit-interval: 1S
    listener:
      concurrency: 5
      ack-mode: manual_immediate
      missing-topics-fatal: false
  # ── Mail（已引入 spring-boot-starter-mail，本地无 SMTP 时保持注释）──
  #mail:
  #  host: smtp.qq.com
  #  port: 465
  #  username: ${MAIL_USERNAME:your_email@qq.com}
  #  password: ${MAIL_PASSWORD:your_auth_code}
  #  properties:
  #    mail:
  #      smtp:
  #        auth: true
  #        starttls:
  #          enable: true
  #          required: true
  #        socketFactory:
  #          class: javax.net.ssl.SSLSocketFactory

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    com.kuma.cloud.project4: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: false

knife4j:
  enable: true

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: "health,info,kmc,kmchealth,kmcstartup,kmcrequestmappings,auditevents"
  endpoint:
    health:
      show-details: always
  health:
    kmc:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: project4
    description: "框架全量功能演示项目"
    version: "1.0.0"

# 框架配置（前缀 kuma.*）
kuma:
  # ── kuma-cloud-starter-jdbcpool ────────────────────────────────────
  # 注意：项目已有 spring.datasource.dynamic，jdbcpool DataSource 不会自动注册（@ConditionalOnMissingBean）
  # 如需单独使用，可排除 dynamic 数据源，或直接通过 JdbcPoolBs 手动构建
  jdbcpool:
    url: ${mysql_url}
    username: ${mysql_username}
    password: ${mysql_password}
    min-size: 5
    max-size: 50
    max-wait-mills: 30000
    valid-query: "select 1"
    test-on-borrow: false
    test-on-return: false
    test-on-idle: true
    test-on-idle-interval-seconds: 60
  # ── kuma-cloud-starter-cache ───────────────────────────────────────
  cache:
    size: 1024
    evict: lru
    persist:
      type: none
  # ── kuma-cloud-starter-netty ───────────────────────────────────────
  # 激活条件：需向容器注册 ChannelInitializer<SocketChannel> Bean 才会启动服务器
  netty:
    port: 8888
    boss-threads: 1
    worker-threads: 0
    backlog: 128
    reader-idle-seconds: 0
    logging-enabled: false
  boot:
    core:
      enabled: true
      collect-hook-enabled: true
      context-restart-enabled: false
      async:
        enabled: true
        virtual-threads: false
        core-pool-size: 10
        max-pool-size: 50
        queue-capacity: 10000
        keep-alive-seconds: 300
        allow-core-thread-time-out: false
        wait-for-tasks-to-complete-on-shutdown: true
        await-termination-seconds: 5
        thread-name-prefix: project4-async
        check-health: true
    web:
      graceful-response:
        print-exception-in-global-advice: false
        response-style: 0
        default-success-code: "0000"
        default-success-msg: success
        default-error-code: "-1"
        default-error-msg: failed
        exclude-packages:
          - org.springdoc*
        exclude-paths:
          - /v3/api-docs/**
          - /swagger-ui/**
          - /doc.html
      filter:
        version: true
        tenant: true
        trace: true
        web-context: true
        report: true
        ping: true
      request:
        enabled: true
        types:
          - LOGGER
      global-exception:
        enabled: true
        types:
          - LOGGER
        ignore-child: true
        time: 300
        max: 5
        length: 3000
    security:
      justauth:
        enabled: true
      ignore-url:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /doc.html
        - /webjars/**
        - /login/**
        - /error
      authentication:
        expire: 7200
        refresh-expire: 28800
        allowed-clock-skew-seconds: 60
    cache:
      redis:
        enabled: true
      caffeine:
        enabled: true
      jetcache:
        enabled: true
        desensitization: true
        clear-remote-on-exit: false
        allow-null-values: true
        separator: "-"
    data:
      datasource:
        enabled: false
        health-enabled: false
      mybatis:
        mybatis-plus:
          enabled: true
    office:
      enabled: false
    mq:
      kafka:
        enabled: false
    springdoc:
      enabled: true
      type: SERVICE
      title: Project4 API 文档
      description: RESTful API 接口文档
      version: 1.0.0
      openapi: "3.0.0"
      paths-to-match:
        - /**
      paths-to-exclude:
        - /actuator/**
      packages-to-scan:
        - com.kuma.cloud.project4
      license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0.html
    ip2region:
      enabled: true
    idempotent:
      enabled: true
    lock:
      enabled: true
      type: LOCAL
    ratelimit:
      enabled: false
    dingtalk:
      enabled: true
      project-id: project4-demo
      dingers:
        DINGTALK:
          # 替换为真实的钉钉 Webhook access_token
          token-id: ${DINGTALK_TOKEN_ID:demo_token_placeholder}
          secret: ${DINGTALK_SECRET:demo_secret_placeholder}
    captcha:
      enabled: true
    actuator:
      managedresource:
        enabled: true

# Seata 分布式事务（本地无 Seata Server，禁用）
seata:
  enabled: false

# RocketMQ（本地无 Broker，通过 ImportFilter 禁用）
rocketmq:
  enabled: false

# MyBatis 多租户
mybatis:
  tenant:
    config:
      enable: false
      tenant-id-column: tenant_id
      db-type: MYSQL

# 延迟线程池
delay:
  thread:
    core: 5
    max: 10
    queue: 100
    keepAlive: 60
