    api project(':kuma-boot-framework:kuma-boot-starter-captcha')
    api project(':kuma-boot-framework:kuma-boot-starter-totp')
    api project(':kuma-boot-framework:kuma-boot-starter-dingtalk')
    api project(':kuma-boot-framework:kuma-boot-starter-sentinel')
    api project(':kuma-boot-framework:kuma-boot-starter-retry')
    api project(':kuma-boot-framework:kuma-boot-starter-encrypt')
    api project(':kuma-boot-framework:kuma-boot-starter-seata')
    api project(':kuma-boot-framework:kuma-boot-starter-grpc')
    api project(':kuma-boot-framework:kuma-boot-starter-monitor')
    api project(':kuma-boot-framework:kuma-boot-starter-openapi')
    api project(':kuma-boot-framework:kuma-boot-starter-sms-common')
    api project(':kuma-boot-framework:kuma-boot-starter-oss-common')
    api project(':kuma-boot-framework:kuma-boot-starter-canal')
    api project(':kuma-boot-framework:kuma-boot-starter-eventbus')
    api project(':kuma-boot-framework:kuma-boot-starter-idgenerator')
    api project(':kuma-boot-framework:kuma-boot-starter-client')
    api project(':kuma-boot-framework:kuma-boot-starter-apollo')
    api project(':kuma-boot-framework:kuma-boot-starter-threadpool')
    api project(':kuma-boot-framework:kuma-boot-starter-useragent')

    // Web 增强
    api project(':kuma-boot-framework:kuma-boot-starter-xss')
    api project(':kuma-boot-framework:kuma-boot-starter-websocket')
    api project(':kuma-boot-framework:kuma-boot-starter-webagg')

    // 链路追踪 / 可观测性
