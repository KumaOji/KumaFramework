plugins {
    id 'java'
    alias(projectLibs.plugins.springboot)
    alias(projectLibs.plugins.spring.dependency.management)
}

def springBootVersion = projectLibs.versions.springboot.get()
dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
    }
}

dependencies {
    // ── kuma-boot-framework 全量 ──────────────────────────────────────────
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-web')
    api project(':kuma-boot-framework:kuma-boot-starter-actuator')
    api project(':kuma-boot-framework:kuma-boot-starter-springdoc')

    // 数据层
    api project(':kuma-boot-framework:kuma-boot-starter-data-common')
    api project(':kuma-boot-framework:kuma-boot-starter-data-datasource')
    api project(':kuma-boot-framework:kuma-boot-starter-data-mybatis')

    // 缓存
    api project(':kuma-boot-framework:kuma-boot-starter-cache-common')
    api project(':kuma-boot-framework:kuma-boot-starter-cache-redis')
    api project(':kuma-boot-framework:kuma-boot-starter-cache-caffeine')
    api project(':kuma-boot-framework:kuma-boot-starter-cache-jetcache')

    // 安全
    api project(':kuma-boot-framework:kuma-boot-starter-security-common')
    api project(':kuma-boot-framework:kuma-boot-starter-security-spring')
    api project(':kuma-boot-framework:kuma-boot-starter-security-jstauth')

    // 消息队列
    api project(':kuma-boot-framework:kuma-boot-starter-mq-common')
    api project(':kuma-boot-framework:kuma-boot-starter-mq-kafka')

    // 功能增强
    api project(':kuma-boot-framework:kuma-boot-starter-ratelimit')
    api project(':kuma-boot-framework:kuma-boot-starter-idempotent')
    api project(':kuma-boot-framework:kuma-boot-starter-lock')
    api project(':kuma-boot-framework:kuma-boot-starter-ip2region')
    api project(':kuma-boot-framework:kuma-boot-starter-office')
    api project(':kuma-boot-framework:kuma-boot-starter-captcha')
    api project(':kuma-boot-framework:kuma-boot-starter-totp')
    api project(':kuma-boot-framework:kuma-boot-starter-dingtalk')
    api project(':kuma-boot-framework:kuma-boot-starter-sentinel')

    // ── kuma-cloud-framework ──────────────────────────────────────────────
    api project(':kuma-cloud-framework:kuma-cloud-starter-bootstrap')
    api project(':kuma-cloud-framework:kuma-cloud-starter-kmc')
    api project(':kuma-cloud-framework:kuma-cloud-starter-alibaba')   // Nacos 注册/配置
    api project(':kuma-cloud-framework:kuma-cloud-starter-sentinel')  // Sentinel 流控
    api project(':kuma-cloud-framework:kuma-cloud-starter-seata')     // Seata 分布式事务
    api project(':kuma-cloud-framework:kuma-cloud-starter-stream')    // RocketMQ Stream

    // ── 第三方 ────────────────────────────────────────────────────────────
    api projectLibs.hutool.core
    api projectLibs.spring.boot.starter.web
    api projectLibs.spring.boot.starter.security
    api projectLibs.spring.doc.webmvc
    implementation projectLibs.spring.boot.starter.mail

    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok

    runtimeOnly projectLibs.mysql
    runtimeOnly projectLibs.postgresql
}

processResources {
    filesMatching('**/application.yml') {
        expand(
                active: 'dev',
                mysql_url: project.findProperty('mysql.url') ?: '',
                mysql_username: project.findProperty('mysql.username') ?: '',
                mysql_password: project.findProperty('mysql.password') ?: '',
                postgresql_url: project.findProperty('postgresql.url') ?: '',
                postgresql_username: project.findProperty('postgresql.username') ?: '',
                postgresql_password: project.findProperty('postgresql.password') ?: '',
                redis_host: project.findProperty('redis.host') ?: '',
                redis_port: project.findProperty('redis.port') ?: '',
                redis_database: project.findProperty('redis.database') ?: '',
                redis_jedis_pool_max_active: project.findProperty('redis.jedis.pool.max-active') ?: '',
                redis_jedis_pool_max_idle: project.findProperty('redis.jedis.pool.max-idle') ?: '',
                redis_jedis_pool_min_idle: project.findProperty('redis.jedis.pool.min-idle') ?: ''
        )
    }
}

bootJar {
    archiveBaseName = 'project4'
}

bootRun {
    // 抑制 Java 25 对 fastjson2 使用 sun.misc.Unsafe 的终止弃用警告
    jvmArgs += ['--sun-misc-Unsafe-memory-access=allow']
}
