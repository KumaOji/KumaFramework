plugins {
    id 'java-library'
}

description = 'KumaFramework skywalking模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot 自动装配（@AutoConfiguration、@ConfigurationProperties、@ConditionalOnWebApplication 等）
    api projectLibs.spring.boot.autoconfigure

    // Spring Boot Web（WebMvcConfigurer、HandlerInterceptor、@RestController 等）
    api projectLibs.spring.boot.starter.web

    // Spring Cloud Context（@RefreshScope）
    api projectLibs.spring.cloud.context

    // SkyWalking APM Toolkit Trace（TraceContext）
    api projectLibs.skywalking.apm.toolkit.trace

    // SLF4J API
    api projectLibs.slf4j.api

    compileOnly projectLibs.jspecify
    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.jakarta.annotation.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
