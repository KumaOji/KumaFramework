plugins {
    id 'java-library'
}

description = 'KumaFramework job-quartz 模块（Quartz Scheduler — 动态任务管理、集群模式、JDBC 持久化）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-job-common')

    api projectLibs.spring.boot.starter.quartz
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.cloud.context

    // AOP（@Aspect、ProceedingJoinPoint）
    api projectLibs.aspectjweaver
    api projectLibs.spring.aop

    // Micrometer Tracing（Tracer、ScopedSpan）
    api projectLibs.micrometer.tracing.api

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
