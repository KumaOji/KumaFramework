plugins {
    id 'java-library'
}

description = 'Kumaframework AI 对话与 RAG 快速启动模块（基于 LangChain4j + Qdrant）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // MCP 桥接（可选）：将 @Tool 工具暴露为 McpTool。compileOnly + @ConditionalOnClass，保持解耦
    compileOnly project(':kuma-boot-framework:kuma-boot-starter-mcp')

    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.boot.web.server
    api projectLibs.spring.web
    api projectLibs.spring.webmvc
    api projectLibs.spring.context
    api projectLibs.spring.beans
    api projectLibs.slf4j.api
    api projectLibs.langchain4j
    api projectLibs.langchain4jopenai
    api projectLibs.langchain4jqdrant
    api projectLibs.langchain4jtika
    api projectLibs.jakarta.annotation.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
