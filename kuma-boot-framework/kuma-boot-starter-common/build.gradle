plugins {
    id 'java-library'
}

description = 'Kumaframework 公共模块'

// 将 project.version 写入 kmc-version.properties，供 KmcVersion 在 IDE 模式下读取
def kmcProjectVersion = project.version
processResources {
    filesMatching('kmc-version.properties') {
        expand(project: [version: kmcProjectVersion])
    }
}


dependencies {
    implementation projectLibs.hutool.core
    implementation projectLibs.hutool.extra
    implementation projectLibs.hutool.crypto
    implementation projectLibs.hutool.json
    implementation projectLibs.hutool.http
    implementation projectLibs.guava
    implementation projectLibs.commons.lang3
    implementation projectLibs.commons.collections4
    implementation projectLibs.commons.codec
    implementation projectLibs.commons.io
    implementation projectLibs.commons.compress
    implementation projectLibs.commons.net
    implementation projectLibs.bouncycastle.provider
    implementation projectLibs.jackson.annotations
    implementation projectLibs.jackson.core
    implementation projectLibs.jackson.databind
    implementation projectLibs.snappy.java
    implementation projectLibs.kryo
    implementation projectLibs.snakeyaml
    implementation projectLibs.slf4j.api
    implementation projectLibs.logback.classic
    implementation projectLibs.uuid.creator
    implementation projectLibs.gson
    implementation projectLibs.fastjson2
    implementation projectLibs.javassist
    implementation projectLibs.orika.core
    implementation projectLibs.hessian
    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.jakarta.validation.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}


