plugins {
    id 'java-library'
}

description = 'KumaFramework 公共模块'

// 将 project.version 写入 kmc-version.properties，供 KmcVersion 在 IDE 模式下读取
def kmcProjectVersion = project.version
processResources {
    filesMatching('kmc-version.properties') {
        expand(project: [version: kmcProjectVersion])
    }
}

dependencies {
    // Hutool
    api projectLibs.hutool.core
    api projectLibs.hutool.extra
    api projectLibs.hutool.crypto
    api projectLibs.hutool.json
    api projectLibs.hutool.http

    // Google / Apache utilities
    api projectLibs.guava
    api projectLibs.commons.lang3
    api projectLibs.commons.collections4
    api projectLibs.commons.codec
    api projectLibs.commons.io
    api projectLibs.commons.compress
    api projectLibs.commons.net

    // Security
    api projectLibs.bouncycastle.provider

    // JSON / Serialization
    api projectLibs.jackson.annotations
    api projectLibs.jackson.core
    api projectLibs.jackson.databind
    api projectLibs.jackson.datatype.jsr353
    api projectLibs.javax.json.api
    api projectLibs.javax.json.impl
    api projectLibs.gson
    api projectLibs.fastjson2
    api projectLibs.snakeyaml

    // Binary / Compression
    api projectLibs.snappy.java
    api projectLibs.kryo

    // Logging
    api projectLibs.slf4j.api
    api projectLibs.logback.classic

    // Bean mapping / Bytecode
    api projectLibs.orika.core
    api projectLibs.javassist
    api projectLibs.hessian

    // Misc pure-Java utilities
    api projectLibs.uuid.creator
    api projectLibs.transmittable.thread.local
    api projectLibs.groovy
    api projectLibs.jsoup
    api projectLibs.jspecify
    api projectLibs.taobao.text.ui
    api projectLibs.swagger.annotations

    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.jakarta.validation.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
