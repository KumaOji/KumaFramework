plugins {
    id 'java-library'
}

description = 'KumaFramework 核心模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot
    api projectLibs.spring.boot
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.boot.web.server
    api projectLibs.spring.boot.webclient

    // Spring Framework
    api projectLibs.spring.core
    api projectLibs.spring.context
    api projectLibs.spring.context.support
    api projectLibs.spring.beans
    api projectLibs.spring.web
    api projectLibs.spring.webflux
    api projectLibs.spring.expression
    api projectLibs.spring.aop
    api projectLibs.spring.cloud.context

    // AOP
    api projectLibs.aspectjweaver
    api projectLibs.aopalliance

    // Reactive
    api projectLibs.reactor.core
    implementation projectLibs.reactivestreams

    // Jakarta (Spring ecosystem compile contract)
    api projectLibs.jakarta.annotation.api
    api projectLibs.jakarta.validation.api

    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
