plugins {
    id 'java-library'
}

description = 'Kumaframework 核心模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-pure')
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api projectLibs.hutool.core
    api projectLibs.hutool.extra
    api projectLibs.hutool.http
    api projectLibs.hutool.json
    api projectLibs.transmittable.thread.local
    api projectLibs.groovy
    api projectLibs.jsoup
    api projectLibs.reactor.core
    api projectLibs.commons.lang3
    api projectLibs.aopalliance
    api projectLibs.spring.boot
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.boot.web.server
    api projectLibs.spring.boot.webclient
    api projectLibs.jakarta.annotation.api
    api projectLibs.jakarta.validation.api
    api projectLibs.spring.aop
    api projectLibs.aspectjweaver
    api projectLibs.spring.cloud.context
    api projectLibs.slf4j.api
    api projectLibs.logback.classic
    api projectLibs.taobao.text.ui
    api projectLibs.jackson.databind
