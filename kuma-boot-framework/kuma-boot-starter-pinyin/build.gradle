plugins {
    id 'java-library'
}

description = 'Kumaframework 拼音模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    // Spring Boot 自动装配（@AutoConfiguration、@ConditionalOnMissingBean 等）
    api projectLibs.spring.boot.autoconfigure

    // Guava（Lists、Maps 等集合工具）
    api projectLibs.guava

    // Pinyin4j（net.sourceforge.pinyin4j - 汉字转拼音）
    api projectLibs.pinyin4j

    // Hutool Extra（cn.hutool.extra.spring.SpringUtil）
    api projectLibs.hutool.extra
}
