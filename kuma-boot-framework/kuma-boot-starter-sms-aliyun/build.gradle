plugins {
    id 'java-library'
}

description = 'Kumaframework sms-aliyun模块（阿里云短信，sms-common 的 SendHandler 实现）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-sms-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    // 阿里云短信 OpenAPI SDK（dysmsapi 20170525）
    // 如需调整版本，确认与 tea-openapi 兼容即可
    api 'com.aliyun:dysmsapi20170525:2.0.24'

    // JSON 序列化（构造 TemplateParam）
    api projectLibs.gson

    // spring boot
    api projectLibs.spring.boot.autoconfigure

    // spring cloud context (@RefreshScope, optional)
    compileOnly projectLibs.spring.cloud.context

    // annotations
    compileOnly projectLibs.jspecify
}
