plugins {
    id 'java-library'
}

description = 'KumaFramework dingtalk模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.web
    api projectLibs.spring.context
    api projectLibs.jakarta.xml.bind.api
    compileOnly projectLibs.spring.cloud.context
    api projectLibs.slf4j.api
    api projectLibs.hutool.core
    runtimeOnly projectLibs.jaxb.runtime
}
