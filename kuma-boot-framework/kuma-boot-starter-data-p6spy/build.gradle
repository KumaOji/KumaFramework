plugins {
    id 'java-library'
}

description = 'Myframework data-p6spy模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot 自动装配（@ConfigurationProperties、@AutoConfiguration 等）
    api projectLibs.spring.boot.autoconfigure

    // spring-boot-starter-jdbc（DataSourceAutoConfiguration 位于此模块）
    api projectLibs.spring.boot.starter.jdbc

    // Spring Cloud Context（@RefreshScope）
    api projectLibs.spring.cloud.context

    // p6spy SQL 拦截
    api projectLibs.p6spy

    // Kafka（KafkaLogger 使用 KafkaTemplate 发送 SQL 日志）
    api projectLibs.spring.kafka

    // Hutool（StrUtil、SqlFormatter）
    api projectLibs.hutool.core
    api projectLibs.hutool.db

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
