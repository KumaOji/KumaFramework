plugins {
    id 'java-library'
}

description = 'Kumaframework oss-common模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    // hutool
    api projectLibs.hutool.core
    api projectLibs.hutool.crypto
    api projectLibs.hutool.json

    // commons
    api projectLibs.commons.io
    api projectLibs.commons.net
    api 'commons-fileupload:commons-fileupload:1.6.0'

    // jakarta activation
    api 'jakarta.activation:jakarta.activation-api:2.1.4'

    // spring boot
    api projectLibs.spring.boot.autoconfigure

    // spring web (MultipartFile)
    compileOnly projectLibs.spring.boot.starter.web

    // spring test (MockMultipartFile)
    compileOnly projectLibs.spring.test

    // spring cloud (optional, for @RefreshScope)
    compileOnly projectLibs.spring.cloud.context
}
