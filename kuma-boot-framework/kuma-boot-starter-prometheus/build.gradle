plugins {
    id 'java-library'
}

description = 'KumaFramework Prometheus 监控集成 —— Micrometer 指标采集、HTTP 拦截器埋点、Alertmanager Webhook 及服务发现 SD 端点'

dependencies {
    // 基础：spring-boot-starter-actuator + micrometer-core + ObservationRegistry
    api project(':kuma-boot-framework:kuma-boot-starter-actuator')
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-monitor')

    // @AutoConfiguration / @ConditionalOn* 等自动配置注解
    compileOnly projectLibs.spring.boot.autoconfigure

    // Prometheus 指标注册表（暴露 /actuator/prometheus 端点）
    // Micrometer 1.12+ 新客户端，底层为 io.prometheus:prometheus-metrics-*
    api projectLibs.micrometer.registry.prometheus

    // @RefreshScope（PrometheusProperties 动态刷新）
    compileOnly projectLibs.spring.cloud.context

    // Spring Cloud 服务发现（PrometheusApi / ReactivePrometheusApi 按需条件注入）
    compileOnly projectLibs.spring.cloud.commons

    // HTTP 拦截器 / WebMvcConfigurer（PrometheusInterceptorAutoConfiguration）
    compileOnly projectLibs.spring.boot.starter.web

    // 响应式服务发现（ReactivePrometheusApi 依赖 Flux）
    compileOnly projectLibs.reactor.core

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
