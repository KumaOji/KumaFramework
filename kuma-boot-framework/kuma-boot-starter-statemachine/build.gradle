plugins {
    id 'java-library'
}

description = 'Kumaframework 状态机模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot AutoConfiguration
    api projectLibs.spring.boot.autoconfigure

    // Spring Cloud Context (@RefreshScope on StatemachineProperties)
    compileOnly projectLibs.spring.cloud.context
}
