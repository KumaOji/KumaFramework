plugins {
    id 'java-library'
}

description = 'KumaFramework 字段翻译模块（Jackson 序列化阶段自动翻译枚举/字典值）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Boot AutoConfiguration
    api projectLibs.spring.boot.autoconfigure

    // Hutool (AnnotationUtil / BeanUtil / ReflectUtil / TypeUtil)
    api projectLibs.hutool.core

    // Guava (Objects)
    api projectLibs.guava

    // TransmittableThreadLocal (跨线程上下文传递)
    api projectLibs.transmittable.thread.local

    // AOP Alliance (MethodInterceptor / Advice — 注解切面)
    api projectLibs.aopalliance

    // Jackson annotations (com.fasterxml.jackson — @JacksonAnnotationsInside)
    compileOnly projectLibs.jackson.annotations

    // Jackson 3.x (tools.jackson — JsonMapper / ValueSerializer / @JsonSerialize)
    compileOnly projectLibs.jackson.core
    compileOnly projectLibs.jackson.databind

    // Jakarta Annotation API (@PostConstruct)
    compileOnly projectLibs.jakarta.annotation.api

    // Jakarta Servlet API (OncePerRequestFilter)
    compileOnly projectLibs.jakarta.servlet.api

    // Spring Web (OncePerRequestFilter / @ConditionalOnWebApplication)
    compileOnly projectLibs.spring.boot.starter.web

    // Spring Cloud Context (@RefreshScope)
    compileOnly projectLibs.spring.cloud.context
}
