plugins {
    id 'java-library'
}

description = 'Kumaframework i18n 模块（国际化：消息/异常多语言、Locale 解析、动态数据源、Bean Validation 国际化）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    api projectLibs.spring.boot.autoconfigure
    api projectLibs.hutool.core

    // Swagger 注解（I18nMessage @Schema）
    compileOnly projectLibs.swagger.annotations.jakarta

    // Web（LocaleResolver / ResponseBodyAdvice / @RestControllerAdvice）
    compileOnly projectLibs.spring.boot.starter.web

    // Bean Validation（EmptyCurlyToDefaultMessageInterpolator）
    compileOnly projectLibs.spring.boot.starter.validation
    compileOnly projectLibs.hibernate.validator

    // @RefreshScope 动态刷新
    compileOnly projectLibs.spring.cloud.context

    compileOnly projectLibs.jspecify
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
