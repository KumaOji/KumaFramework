plugins {
    id 'java-library'
}

description = 'Kumaframework client模块'

dependencies {
    // 基础公共工具（LogUtils 等）
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Forest HTTP Client（@ForestScan / @BaseRequest / @Get / @Post / ForestInterceptor 等）
    api projectLibs.forest.spring.boot3.starter

    // Retrofit Spring Boot Starter（@RetrofitScan / @RetrofitClient / BasePathMatchInterceptor /
    // GlobalInterceptor，同时传递引入 okhttp3 / retrofit2 / converter-jackson）
    api projectLibs.retrofit.spring.boot.starter

    // Spring WebFlux（WebClient / WebClientAdapter / HttpServiceProxyFactory / @ImportHttpServices）
    api projectLibs.spring.boot.starter.webflux

    // RedisRepository（MyInterceptor 构造注入，Forest 拦截器中读取 Redis token）
    compileOnly project(':kuma-boot-framework:kuma-boot-starter-cache-redis')

    // @AutoConfiguration / @ConditionalOnProperty 等自动配置注解
    compileOnly projectLibs.spring.boot.autoconfigure

    // @RefreshScope（ForestProperties / RetrofitProperties）
    compileOnly projectLibs.spring.cloud.context

    // JSONObject（ClusterApis）
    compileOnly projectLibs.fastjson2

    // HttpServletRequest（TokenHolder）
    compileOnly projectLibs.jakarta.servlet.api

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
