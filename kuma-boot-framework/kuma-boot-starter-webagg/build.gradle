plugins {
    id 'java-library'
}

description = 'Kumaframework Web聚合层模块（MyBatisPlus / JPA / QueryDSL 多ORM聚合封装）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-web')
    api project(':kuma-boot-framework:kuma-boot-starter-data-mybatis')
    api project(':kuma-boot-framework:kuma-boot-starter-data-jpa')
    api project(':kuma-boot-framework:kuma-boot-starter-security-spring')
    api project(':kuma-boot-framework:kuma-boot-starter-ddd')

    // Spring Boot AutoConfiguration
    api projectLibs.spring.boot.autoconfigure

    // Hutool
    api projectLibs.hutool.core

    // FastJSON2
    api projectLibs.fastjson2

    // Guava
    api projectLibs.guava

    // Commons Lang3
    api projectLibs.commons.lang3

    // JSpecify (@NonNull)
    api projectLibs.jspecify

    // Swagger / OpenAPI (@Operation / @Schema)
    api projectLibs.swagger.annotations

    // AOP Alliance (MethodInterceptor / MethodInvocation)
    api projectLibs.aopalliance

    // EasyPOI (Excel 导入导出)
    api projectLibs.easypoi.base
    api projectLibs.easypoi.web

    // Apache POI (Workbook — EasyPOI 传递依赖，显式声明避免版本冲突)
    api projectLibs.poi
    api projectLibs.poi.ooxml

    // MyBatis-Plus (可选 ORM — @TableId / CrudRepository / IService 等)
    compileOnly projectLibs.mybatis.plus.extension

    // QueryDSL (可选 — Predicate / EntityPathBase / BooleanPath 等)
    compileOnly projectLibs.querydsl.core
    compileOnly projectLibs.querydsl.jpa

    // Jakarta Persistence API (可选 JPA — @Entity / @MappedSuperclass / @Id 等)
    compileOnly projectLibs.jakarta.persistence.api

    // Spring Data JPA (可选 — Page / Pageable / AuditingEntityListener 等)
    compileOnly projectLibs.spring.boot.starter.data.jpa

    // Spring Security (可选 — @PreAuthorize)
    compileOnly projectLibs.spring.boot.starter.security

    // Spring Web (可选 — @GetMapping / MultipartFile 等)
    compileOnly projectLibs.spring.boot.starter.web

    // Jakarta Servlet API
    compileOnly projectLibs.jakarta.servlet.api

    // Jakarta Validation (@NotNull / @NotBlank)
    compileOnly projectLibs.jakarta.validation.api

    // Jakarta Annotation API (@Resource / @PreDestroy)
    compileOnly projectLibs.jakarta.annotation.api

    // Spring JDBC (JdbcTemplate / JdbcClient)
    compileOnly projectLibs.spring.boot.starter.jdbc

    // MyBatis (PropertyNamer — MyBatis-Plus 内部工具)
    compileOnly projectLibs.mybatis.plus
}
