plugins {
    id 'java-library'
}

description = 'Kumaframework 幂等模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-cache-redis')
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.boot.starter.web
    api projectLibs.spring.boot.starter.data.redis
    api projectLibs.spring.aop
    api projectLibs.spring.context
    api projectLibs.spring.expression
    api projectLibs.spring.cloud.context
    api projectLibs.guava
    api projectLibs.fastjson2
    api projectLibs.commons.lang3
    api projectLibs.aspectjweaver
    api projectLibs.spring.redisson
    api projectLibs.mybatis.spring
    api projectLibs.jspecify
    compileOnly projectLibs.jakarta.servlet.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}
