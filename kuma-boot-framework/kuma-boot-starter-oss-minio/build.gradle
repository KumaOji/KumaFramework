plugins {
    id 'java-library'
}

description = 'Myframework oss-minio模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-oss-common')

    // minio
    api projectLibs.minio

    // hutool
    api projectLibs.hutool.core
    api projectLibs.hutool.extra

    // guava (ByteStreams)
    api projectLibs.guava

    // okhttp3 (MinioOssConfiguration uses OkHttpClient)
    api projectLibs.okhttp3

    // spring boot
    api projectLibs.spring.boot.autoconfigure

    // spring web (MultipartFile, HttpServletRequest/Response)
    compileOnly projectLibs.spring.boot.starter.web
}
