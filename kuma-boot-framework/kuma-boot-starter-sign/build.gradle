plugins {
    id 'java-library'
}

description = 'Kumaframework API 签名验签模块（开放接口 AppKey + 签名校验，防篡改/防重放）'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // spring boot
    api projectLibs.spring.boot.autoconfigure

    // spring web（HandlerInterceptor / WebMvcConfigurer / HandlerMethod）
    api projectLibs.spring.boot.starter.web

    // servlet api（HttpServletRequest，运行期由容器提供）
    compileOnly projectLibs.jakarta.servlet.api

    // spring cloud context（@RefreshScope，可选）
    compileOnly projectLibs.spring.cloud.context

    // annotations（@Nullable，CLASS retention）
    compileOnly projectLibs.jspecify
}
