plugins {
    id 'java-library'
}

description = 'Kumaframework IP 地址解析模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.boot.starter.web
    api projectLibs.spring.context
    api projectLibs.spring.beans
    api projectLibs.spring.cloud.context
    api projectLibs.ip2region
    api projectLibs.hutool.json
    api projectLibs.hutool.http
    implementation projectLibs.guava
    implementation projectLibs.httpclient5
    implementation projectLibs.dnsjava
    compileOnly projectLibs.jspecify
    compileOnly projectLibs.jackson.annotations
    compileOnly projectLibs.jakarta.validation.api
    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}
