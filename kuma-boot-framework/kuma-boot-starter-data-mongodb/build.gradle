plugins {
    id 'java-library'
}

description = 'Myframework data-mongodb模块'

dependencies {
    // 基础公共工具（LogUtils / JacksonUtils 等）
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Data MongoDB（MongoTemplate / MongoRepository / MongoDatabaseFactory 等核心类）
    api projectLibs.spring.boot.starter.data.mongodb

    // tools.jackson.databind.JsonNode（DBObjectToJsonNodeConverter / MongoJsonUtils）
    api projectLibs.jackson.databind

    // com.fasterxml.jackson.annotation.@JsonFormat（BaseMongoEntity）
    api projectLibs.jackson.annotations

    // hutool ReflectUtil / StrUtil / DateUtil（MongoHelper）
    api projectLibs.hutool.core

    // hutool JSONUtil / JSONObject（MongoHelper.logSave）
    api projectLibs.hutool.json

    // @Nullable（DBObjectToJsonNodeConverter）
    api projectLibs.jspecify

    // @AutoConfiguration / @ConditionalOnProperty 等自动配置注解
    compileOnly projectLibs.spring.boot.autoconfigure

    // WebServerInitializedEvent / WebServerApplicationContext（MongoStartedEventListener）
    compileOnly projectLibs.spring.boot.starter.web

    // @RefreshScope（MongodbProperties）
    compileOnly projectLibs.spring.cloud.context

    // SystemUtil（SystemTool）
    compileOnly projectLibs.hutool.system

    // @Schema（BaseMongoEntity，Jakarta EE 版本）
    compileOnly projectLibs.swagger.annotations.jakarta

    // @Column（BaseMongoEntity）
    compileOnly projectLibs.jakarta.persistence.api

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
