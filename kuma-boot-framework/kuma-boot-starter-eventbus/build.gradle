plugins {
    id 'java-library'
}

description = 'Kumaframework eventbus模块'

dependencies {
    // 基础公共工具（LogUtils 等）
    api project(':kuma-boot-framework:kuma-boot-starter-core')

    // Guava EventBus（GuavaEventListenerRegistry - AsyncEventBus / EventBus）
    api projectLibs.guava

    // Greenrobot EventBus（GreenrobotEventListenerRegistry - EventBus.builder()）
    api projectLibs.greenrobot.eventbus

    // LMAX Disruptor（DisruptorEventListenerRegistry - Disruptor / RingBuffer）
    api projectLibs.disruptor

    api projectLibs.hutool.core
    api projectLibs.hutool.extra


    // BasicThreadFactory（DisruptorEventListenerRegistry）
    api projectLibs.commons.lang3

    // TtlExecutors（GreenrobotEventBusExecutor）
    api projectLibs.transmittable.thread.local

    // @AutoConfiguration / @ConditionalOn* 等自动配置注解
    compileOnly projectLibs.spring.boot.autoconfigure

    // @PostConstruct（多个 Registry / Template 类）
    compileOnly projectLibs.jakarta.annotation.api

    // Logger / LoggerFactory / MDC（DisruptorProvider / Distributor / WorkerStation 等）
    compileOnly projectLibs.slf4j.api

    // StrUtil / Tuple / Copier（EventBusTypeEnum / DisruptorService 等）
    compileOnly projectLibs.hutool.core

    // JSON（CustomExceptionHandler）
    compileOnly projectLibs.fastjson2

    // @RefreshScope（DisruptorProperties）
    compileOnly projectLibs.spring.cloud.context

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
