plugins {
    id 'java-library'
}

description = 'Kumaframework xxl-job模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-lock')

    // Spring Boot 自动装配（@AutoConfiguration、@ConditionalOnBean 等）
    api projectLibs.spring.boot.autoconfigure

    // Spring Cloud Context（@RefreshScope）
    api projectLibs.spring.cloud.context

    // Spring Cloud Commons（DiscoveryClient）
    api projectLibs.spring.cloud.commons

    // Micrometer Tracing（Tracer、Span、ScopedSpan、SpanNamer 等）
    api projectLibs.micrometer.tracing.api

    // XXL-Job Core（XxlJobSpringExecutor、@XxlJob、XxlJobHelper 等）
    api projectLibs.xxl.job.core

    // Hutool
    api projectLibs.hutool.core
    api projectLibs.hutool.http
    api projectLibs.hutool.json

    // Fastjson2
    api projectLibs.fastjson2

    // AOP Alliance（MethodInterceptor、MethodInvocation）
    api projectLibs.aopalliance

    // AspectJ（@Aspect、ProceedingJoinPoint 等）
    api projectLibs.aspectjweaver

    // Spring AOP（ProxyFactoryBean、AopConfigException）
    api projectLibs.spring.aop

    // Spring Expression（SpelExpressionParser、StandardEvaluationContext 等）
    api projectLibs.spring.expression

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
