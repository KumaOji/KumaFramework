plugins {
    id 'java-library'
}

description = 'KumaFramework 性能测试模块 — 基于 Apache JMeter 的嵌入式压测执行'

// JMeter 5.6.3 pins Groovy 3.0.20 (org.codehaus.groovy), which conflicts with
// the framework's Groovy 4 runtime and cannot process JDK 25 class files.
// Keep JMeter itself at 5.6.3, but align all of its Groovy modules to Groovy 4.
configurations.configureEach {
    exclude group: 'org.codehaus.groovy'
}

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api projectLibs.spring.boot.autoconfigure
    api projectLibs.spring.cloud.context

    // 嵌入式 JMeter 引擎（StandardJMeterEngine / SaveService / JMeterUtils 等）
    api projectLibs.jmeter.core
    // 取样器、监听器、断言等组件
    api projectLibs.jmeter.components
    // HTTP 取样器（最常用的压测协议）
    api projectLibs.jmeter.http

    def groovyVersion = projectLibs.versions.groovy.get()
    api platform("org.apache.groovy:groovy-bom:${groovyVersion}")
    [
            'groovy',
            'groovy-dateutil',
            'groovy-datetime',
            'groovy-jmx',
            'groovy-json',
            'groovy-jsr223',
            'groovy-sql',
            'groovy-templates',
            'groovy-xml',
    ].each { module ->
        api "org.apache.groovy:${module}"
    }

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
