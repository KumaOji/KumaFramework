plugins {
    id 'java-library'
}

description = 'Myframework data-elasticsearch模块'

dependencies {
    // 基础公共工具（LogUtils 等）
    api project(':kuma-boot-framework:kuma-boot-starter-common')

    // Spring Data Elasticsearch（ElasticsearchConfigurationSupport / ElasticsearchCustomConversions）
    // 同时传递引入 co.elastic.clients:elasticsearch-java（ElasticsearchClient / ElasticsearchAsyncClient 等）
    api projectLibs.spring.boot.starter.data.elasticsearch

    // EasyEs（@EsMapperScan，ElasticsearchAutoConfiguration / EasyEsConfiguration）
    api projectLibs.easy.es

    // fastjson2 JSONObject（ElasticUtil.queryPageByField）
    api projectLibs.fastjson2

    // hutool JSONUtil（ElasticsearchTemplate.getFilter - JSONUtil.toJsonStr）
    api projectLibs.hutool.json

    // bboss StringUtil（ElasticsearchTemplate - StringUtil.isNotEmpty / collectionToDelimitedString）
    api projectLibs.bboss.util

    // spring-web（@RestController / @RequestMapping，ElasticController）
    compileOnly projectLibs.spring.web

    // @RefreshScope（ElasticsearchProperties / RestClientPoolProperties）
    compileOnly projectLibs.spring.cloud.context

    // @AutoConfiguration / @ConditionalOnProperty / @ConditionalOnExpression 等自动配置注解
    compileOnly projectLibs.spring.boot.autoconfigure

    compileOnly projectLibs.lombok
    annotationProcessor projectLibs.lombok
}
