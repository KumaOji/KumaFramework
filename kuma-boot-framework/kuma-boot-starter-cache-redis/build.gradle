plugins {
    id 'java-library'
}

description = 'Kumaframework cache-redis模块'

dependencies {
    api project(':kuma-boot-framework:kuma-boot-starter-common')
    api project(':kuma-boot-framework:kuma-boot-starter-core')
    api project(':kuma-boot-framework:kuma-boot-starter-lock')
    api projectLibs.hutool.extra
    api projectLibs.spring.boot.starter.data.redis
    api projectLibs.jedis
    api projectLibs.commons.pool2
    api projectLibs.jakarta.annotation.api
    api projectLibs.spring.cloud.context
    api projectLibs.spring.redisson
    api projectLibs.aspectjweaver
    api projectLibs.spring.boot.starter.cache
    api projectLibs.spring.boot.web.server
    api projectLibs.jackson.databind
    api projectLibs.spring.messaging
}
