import java.time.LocalDateTime
import java.time.format.DateTimeFormatter

buildscript {
    ext {
        kmcVersion           = version
        kmcGroup             = "io.github.kumaoji"
        springBootVersion    = "4.0.3"
        aspectjweaverVersion = "1.9.22.1"
    }

    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/public' }
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://repo.spring.io/release'   }
        maven { url = 'https://repo.spring.io/milestone' }
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        // gradle/shadow.gradle 使用 apply plugin: 方式，需要提前将 jar 放入 classpath
        classpath "com.gradleup.shadow:shadow-gradle-plugin:8.3.6"
        // gradle/proguard.gradle 中 import proguard.gradle.ProGuardTask 需要此依赖
        classpath "com.guardsquare:proguard-gradle:7.5.0"
    }
}

plugins {
    id 'java-library'
    id 'idea'
    // apply false：只将插件 jar 放入 classpath，不应用到根项目；
    // 子项目可直接 apply plugin: 'com.google.cloud.tools.jib' 无需再指定版本
    id 'com.google.cloud.tools.jib' apply false
}

allprojects {
    version = project.kmcVersion ?: '1.0.0'
    group   = project.kmcGroup   ?: 'io.github.kumaoji'

    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/public'  }
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://maven.aliyun.com/repository/google'  }
        maven { url = 'https://repo.spring.io/release'   }
        maven { url = 'https://repo.spring.io/milestone' }
        maven { url = 'https://repo.e-iceblue.com/nexus/content/groups/public/' }
        maven { url = 'https://releases.aspose.com/java/repo/' }
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'idea'

    java {
        sourceCompatibility = JavaVersion.VERSION_25
        targetCompatibility = JavaVersion.VERSION_25
        toolchain { languageVersion = JavaLanguageVersion.of(25) }
    }

    // aspectjweaver 全局强制版本，避免不同传递依赖带入不一致版本
    configurations.configureEach {
        resolutionStrategy {
            force "org.aspectj:aspectjweaver:${aspectjweaverVersion}"
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding     = 'UTF-8'
        options.compilerArgs += [
            '--enable-preview',
            '-parameters',
            '-Xlint:unchecked',
            '-Xlint:deprecation',
        ]
    }
    tasks.withType(Test).configureEach     { jvmArgs += '--enable-preview' }
    tasks.withType(JavaExec).configureEach { jvmArgs += '--enable-preview' }

    javadoc {
        failOnError = false
        options {
            author  = true
            version = true
            title   = project.name
            links   "https://docs.oracle.com/en/java/javase/25/docs/api"
            addStringOption('Xdoclint:none', '-quiet')
            addStringOption('encoding', 'UTF-8')
            addStringOption('charSet',  'UTF-8')
            addBooleanOption('-enable-preview', true)
            addStringOption('-release', '25')
        }
        if (JavaVersion.current().isJava9Compatible()) {
            options.addBooleanOption('html5', true)
        }
    }

    // 将 LICENSE.txt 打包进每个 jar 的 META-INF 目录
    tasks.withType(Jar).configureEach {
        from(project.rootDir) {
            include 'LICENSE.txt'
            into 'META-INF'
        }
    }

    jar {
        enabled           = true
        archiveClassifier = ""
        manifest {
            attributes(
                'Implementation-Title'  : project.name,
                'Implementation-Version': project.version,
                'Implementation-Vendor' : 'kuma-cloud',
                'Automatic-Module-Name' : project.name.replace('-', '.'),
                'Build-Jdk-Spec'        : JavaVersion.VERSION_25.toString(),
                'Built-Gradle'          : gradle.gradleVersion,
                'Build-OS'              : System.getProperty('os.name'),
                'Build-Jdk'             : System.getProperty('java.version'),
                'Build-Timestamp'       : LocalDateTime.now().format(DateTimeFormatter.ofPattern('yyyy-MM-dd HH:mm:ss'))
            )
        }
    }
}
