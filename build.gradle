import java.time.LocalDateTime
import java.time.format.DateTimeFormatter

buildscript {
    ext {
        kmcVersion           = version
        kmcGroup             = "io.github.kumaoji"
        springBootVersion    = "4.0.3"
        aspectjweaverVersion = "1.9.22.1"
    }

    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/public' }
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://repo.spring.io/release'   }
        maven { url = 'https://repo.spring.io/milestone' }
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        // gradle/shadow.gradle 使用 apply plugin: 方式，需要提前将 jar 放入 classpath
        classpath "com.gradleup.shadow:shadow-gradle-plugin:8.3.6"
        // gradle/proguard.gradle 中 import proguard.gradle.ProGuardTask 需要此依赖
        classpath "com.guardsquare:proguard-gradle:7.5.0"
    }
}

plugins {
    id 'java-library'
    id 'idea'
    // apply false：只将插件 jar 放入 classpath，不应用到根项目；
    // 子项目可直接 apply plugin: 'com.google.cloud.tools.jib' 无需再指定版本
    id 'com.google.cloud.tools.jib' apply false
}

allprojects {
    version = project.kmcVersion ?: '1.0.0'
    group   = project.kmcGroup   ?: 'io.github.kumaoji'

    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/public'  }
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://maven.aliyun.com/repository/google'  }
        maven { url = 'https://repo.spring.io/release'   }
        maven { url = 'https://repo.spring.io/milestone' }
        maven { url = 'https://repo.e-iceblue.com/nexus/content/groups/public/' }
        maven { url = 'https://releases.aspose.com/java/repo/' }
        maven { url = 'https://jitpack.io' }
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'idea'

    java {
        sourceCompatibility = JavaVersion.VERSION_25
        targetCompatibility = JavaVersion.VERSION_25
        toolchain { languageVersion = JavaLanguageVersion.of(25) }
    }

    // aspectjweaver 全局强制版本，避免不同传递依赖带入不一致版本
    configurations.configureEach {
        resolutionStrategy {
            force "org.aspectj:aspectjweaver:${aspectjweaverVersion}"
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding     = 'UTF-8'
        options.compilerArgs += [
            '--enable-preview',
            '-parameters',
            '-Xlint:unchecked',
            '-Xlint:deprecation',
        ]
    }
    tasks.withType(Test).configureEach     { jvmArgs += '--enable-preview' }
    tasks.withType(JavaExec).configureEach { jvmArgs += '--enable-preview' }

    javadoc {
        failOnError = false
        options {
            author  = true
            version = true
            title   = project.name
            links   "https://docs.oracle.com/en/java/javase/25/docs/api"
            addStringOption('Xdoclint:none', '-quiet')
            addStringOption('encoding', 'UTF-8')
            addStringOption('charSet',  'UTF-8')
            addBooleanOption('-enable-preview', true)
            addStringOption('-release', '25')
        }
        if (JavaVersion.current().isJava9Compatible()) {
            options.addBooleanOption('html5', true)
        }
    }

    // 将 LICENSE.txt 打包进每个 jar 的 META-INF 目录
    tasks.withType(Jar).configureEach {
        from(project.rootDir) {
            include 'LICENSE.txt'
            into 'META-INF'
        }
    }

    jar {
        enabled           = true
        archiveClassifier = ""
        manifest {
            attributes(
                'Implementation-Title'  : project.name,
                'Implementation-Version': project.version,
                'Implementation-Vendor' : 'kuma-cloud',
                'Automatic-Module-Name' : project.name.replace('-', '.'),
                'Build-Jdk-Spec'        : JavaVersion.VERSION_25.toString(),
                'Built-Gradle'          : gradle.gradleVersion,
                'Build-OS'              : System.getProperty('os.name'),
                'Build-Jdk'             : System.getProperty('java.version'),
                'Build-Timestamp'       : LocalDateTime.now().format(DateTimeFormatter.ofPattern('yyyy-MM-dd HH:mm:ss'))
            )
        }
    }
}

// ── Maven Central publish：subprojects 块之后 apply，确保 java-library 已就绪 ──
configure(subprojects.findAll { it.name.startsWith('kuma-boot-starter-') }) {
    apply from: rootProject.file('gradle/publish-central.gradle')
}

// ── 按依赖层次顺序发布所有 starter 到 Maven Central ──
gradle.projectsEvaluated {
    // 发布顺序：按模块依赖层次从底层到高层排列
    def publishOrder = [
        // Layer 0 — 无 Spring 依赖
        'kuma-boot-starter-common',
        // Layer 1 — 仅依赖 common
        'kuma-boot-starter-core',
        'kuma-boot-starter-lock',
        'kuma-boot-starter-data-common',
        'kuma-boot-starter-data-p6spy',
        'kuma-boot-starter-data-elasticsearch',
        'kuma-boot-starter-data-mongodb',
        'kuma-boot-starter-data-shardingsphere',
        'kuma-boot-starter-mq-common',
        'kuma-boot-starter-security-common',
        'kuma-boot-starter-oss-common',
        'kuma-boot-starter-cache-common',
        'kuma-boot-starter-cache-caffeine',
        'kuma-boot-starter-cache-jetcache',
        'kuma-boot-starter-apollo',
        'kuma-boot-starter-canal',
        'kuma-boot-starter-dingtalk',
        'kuma-boot-starter-elk',
        'kuma-boot-starter-eventbus',
        'kuma-boot-starter-frp',
        'kuma-boot-starter-ip2region',
        'kuma-boot-starter-job-common',
        'kuma-boot-starter-logger',
        'kuma-boot-starter-mail',
        'kuma-boot-starter-mqtt',
        'kuma-boot-starter-office',
        'kuma-boot-starter-openapi',
        'kuma-boot-starter-pinyin',
        'kuma-boot-starter-retry',
        'kuma-boot-starter-sentinel',
        'kuma-boot-starter-skywalking',
        'kuma-boot-starter-sms-common',
        'kuma-boot-starter-springdoc',
        'kuma-boot-starter-statemachine',
        'kuma-boot-starter-threadpool',
        'kuma-boot-starter-totp',
        'kuma-boot-starter-translation',
        'kuma-boot-starter-useragent',
        'kuma-boot-starter-xss',
        'kuma-boot-starter-sensitive',
        'kuma-boot-starter-encrypt',
        // Layer 2
        'kuma-boot-starter-actuator',
        'kuma-boot-starter-cache-redis',
        'kuma-boot-starter-data-datasource',
        'kuma-boot-starter-mq-kafka',
        'kuma-boot-starter-oss-minio',
        // Layer 3
        'kuma-boot-starter-monitor',
        'kuma-boot-starter-captcha',
        'kuma-boot-starter-idempotent',
        'kuma-boot-starter-ratelimit',
        'kuma-boot-starter-security-jstauth',
        'kuma-boot-starter-job-xxl',
        'kuma-boot-starter-test',
        'kuma-boot-starter-grpc',
        'kuma-boot-starter-data-jpa',
        'kuma-boot-starter-ddd',
        'kuma-boot-starter-flowengine',
        'kuma-boot-starter-seata',
        'kuma-boot-starter-tracer',
        'kuma-boot-starter-idgenerator',
        'kuma-boot-starter-client',
        // Layer 4
        'kuma-boot-starter-data-mybatis',
        'kuma-boot-starter-security-spring',
        'kuma-boot-starter-metrics',
        'kuma-boot-starter-prometheus',
        // Layer 5
        'kuma-boot-starter-web',
        // Layer 6
        'kuma-boot-starter-webagg',
        'kuma-boot-starter-websocket',
    ]

    def publishTasks = publishOrder.collect { name ->
        allprojects.find { it.name == name }?.tasks?.findByName('publishToCentralPortal')
    }.findAll { it != null }

    // 强制顺序：每个 task 必须在前一个完成后才执行
    publishTasks.eachWithIndex { task, i ->
        if (i > 0) task.mustRunAfter(publishTasks[i - 1])
    }

    def publishCount = publishTasks.size()
    tasks.register('publishAllStartersToCentralPortal') {
        group       = 'publishing'
        description = 'Publish all kuma-boot-starter-* to Maven Central in dependency order'
        dependsOn   publishTasks.collect { it.path }
        doFirst {
            logger.lifecycle("Publishing ${publishCount} starter modules to Maven Central...")
        }
    }
}
