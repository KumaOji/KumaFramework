pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = 'https://maven.aliyun.com/repository/public' }
        // IntelliJ Platform Gradle Plugin (idea-plugin)
        maven { url = 'https://packages.jetbrains.team/maven/p/ij/intellij-dependencies' }
        maven { url = 'https://www.jetbrains.com/intellij-repository/releases' }
    }
}

rootProject.name = 'Myframework'

dependencyResolutionManagement {
    versionCatalogs {
        create("projectLibs") {
            from(files("./gradle/libs.versions.toml"))
        }
    }
}

def oneLayerProjects = ['framework']
for (name in oneLayerProjects) {
    include "kuma-boot-${name}"
    include "kuma-cloud-${name}"
    include "kuma-bigdata-${name}"
    include "kuma-other-${name}"
}

def frameworkBootSubModules = ['common', 'core', 'data-datasource',
                               'data-mybatis', 'office', 'actuator',
                               'mq-common', 'mq-kafka', 'ip2region',
                               'data-common', 'springdoc', 'web',
                               'cache-jetcache', 'cache-caffeine', 'cache-common',
                               'cache-redis', 'security-common', 'security-spring',
                               'ratelimit', 'idempotent','lock',
                                'security-jstauth','totp','captcha',
                                'dingtalk','sentinel']
for (name in frameworkBootSubModules) {
    include "kuma-boot-framework:kuma-boot-starter-${name}"
}

def frameworkCloudSubModules = ['bootstrap','seata','kmc',
                           'sentinel','stream','alibaba',
                            'cache','jdbcpool','netty']
//def frameworkCloudSubModules2 = ['tx', 'mq',
//                                'ccsr','job','rpc']
for (name in frameworkCloudSubModules) {
    include "kuma-cloud-framework:kuma-cloud-starter-${name}"
}
//for (name in frameworkCloudSubModules2) {
//    include "kuma-cloud-framework:kuma-cloud-${name}"
//}

def frameworkOtherSubModules = ['design-patterns','plugin']
for (name in frameworkOtherSubModules) {
    include "kuma-other-framework:kuma-cloud-${name}"
}

def frameworkCloudPluginSubModules = ['gradle-plugin', 'elasticsearch-plugin', 'idea-plugin', 'maven-plugin']
for (name in frameworkCloudPluginSubModules) {
    include "kuma-other-framework:kuma-cloud-plugin:kuma-cloud-${name}"
}

include "kuma-project"
def projectBootSubModules = ['project1', 'project2', 'project3', 'project4','project5', 'blog']
for (name in projectBootSubModules) {
    include "kuma-project:kuma-project-${name}"
}


// kuma-cloud-tx — 仅包含客户端（RM）依赖链：rm → common
include "kuma-cloud-tx"
project(":kuma-cloud-tx").projectDir = file("kuma-cloud-framework/kuma-cloud-tx")
def txSubModules = ['common', 'rm']
for (name in txSubModules) {
    include "kuma-cloud-tx:kuma-cloud-tx-${name}"
    project(":kuma-cloud-tx:kuma-cloud-tx-${name}").projectDir = file("kuma-cloud-framework/kuma-cloud-tx/kuma-cloud-tx-${name}")
}

// kuma-cloud-ccsr — 仅包含客户端依赖链：client-starter → client → api + spi; api → common
include "kuma-cloud-ccsr"
project(":kuma-cloud-ccsr").projectDir = file("kuma-cloud-framework/kuma-cloud-ccsr")
def ccsrSubModules = ['api', 'client', 'client-starter', 'common', 'spi']
for (name in ccsrSubModules) {
    include "kuma-cloud-ccsr:kuma-cloud-ccsr-${name}"
    project(":kuma-cloud-ccsr:kuma-cloud-ccsr-${name}").projectDir = file("kuma-cloud-framework/kuma-cloud-ccsr/kuma-cloud-ccsr-${name}")
}

// kuma-cloud-job — 仅包含 Worker 依赖链：worker → common
include "kuma-cloud-job"
project(":kuma-cloud-job").projectDir = file("kuma-cloud-framework/kuma-cloud-job")
def jobSubModules = ['common', 'worker']
for (name in jobSubModules) {
    include "kuma-cloud-job:kuma-cloud-job-${name}"
    project(":kuma-cloud-job:kuma-cloud-job-${name}").projectDir = file("kuma-cloud-framework/kuma-cloud-job/kuma-cloud-job-${name}")
}

// kuma-cloud-mq — 仅包含客户端依赖链（client 依赖全部 mq 子模块）
include "kuma-cloud-mq"
project(":kuma-cloud-mq").projectDir = file("kuma-cloud-framework/kuma-cloud-mq")
def mqSubModules = ['broker', 'client', 'cluster', 'common', 'consistency', 'metrics', 'plugin', 'proxy']
for (name in mqSubModules) {
    include "kuma-cloud-mq:kuma-cloud-mq-${name}"
    project(":kuma-cloud-mq:kuma-cloud-mq-${name}").projectDir = file("kuma-cloud-framework/kuma-cloud-mq/kuma-cloud-mq-${name}")
}

// kuma-cloud-rpc — 仅包含客户端依赖链：client → core + filter + metrics + plugin + serialization + registry; core → common
include "kuma-cloud-rpc"
project(":kuma-cloud-rpc").projectDir = file("kuma-cloud-framework/kuma-cloud-rpc")
def rpcSubModules = ['client', 'common', 'core', 'filter', 'metrics', 'plugin', 'registry', 'serialization']
for (name in rpcSubModules) {
    include "kuma-cloud-rpc:kuma-cloud-rpc-${name}"
    project(":kuma-cloud-rpc:kuma-cloud-rpc-${name}").projectDir = file("kuma-cloud-framework/kuma-cloud-rpc/kuma-cloud-rpc-${name}")
}

gradle.settingsEvaluated {
    if (JavaVersion.current() < JavaVersion.VERSION_25) {
        throw new GradleException("This build requires JDK 25. Current: ${JavaVersion.current()}. Use -Dorg.gradle.ignoreBuildJavaVersionCheck to skip.")
    }
}


