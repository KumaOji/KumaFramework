pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = 'https://maven.aliyun.com/repository/public' }
    }
}

rootProject.name = 'Myframework'

dependencyResolutionManagement {
    versionCatalogs {
        create("projectLibs") {
            from(files("./gradle/libs.versions.toml"))
        }
    }
}


def oneLayerProjects = ['framework', 'project']
for (name in oneLayerProjects) {
    include "myframework-cloud-${name}"
}

def frameworkSubModules = ['common', 'core', 'data-datasource', 'data-mybatis', 'cache-common', 'cache-redis', 'infrastruct', "spring", "mybatis", "datasource", "application"]
for (name in frameworkSubModules) {
    include "myframework-cloud-framework:myframework-module-${name}"
}

def projectSubModules = ['project1', 'project2', 'project3']
for (name in projectSubModules) {
    include "myframework-cloud-project:myframework-project-${name}"
}

gradle.settingsEvaluated {
    if (JavaVersion.current() < JavaVersion.VERSION_25) {
        throw new GradleException("This build requires JDK 25. Current: ${JavaVersion.current()}. Use -Dorg.gradle.ignoreBuildJavaVersionCheck to skip.")
    }
}


include 'myframework-cloud-framework:myframework-module-office'
include 'myframework-cloud-framework:myframework-module-mq-common'
include 'myframework-cloud-framework:myframework-module-mq-kafka'

include 'myframework-cloud-framework:myframework-module-data-common'
include 'myframework-cloud-framework:myframework-module-cache-jetcache'
include 'myframework-cloud-framework:myframework-module-cache-caffeine'
include 'myframework-cloud-framework:myframework-module-springdoc'
include 'myframework-cloud-framework:myframework-module-web'