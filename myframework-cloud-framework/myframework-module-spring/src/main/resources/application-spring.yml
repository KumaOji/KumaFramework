# Myframework Spring 模块默认配置
# 引入方式：spring.profiles.include: spring

# ----- 日志 -----
logging:
  level:
    root: INFO
    com.kuma.boot: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

# ----- SpringDoc / Swagger -----
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    try-it-out-enabled: true

# OpenAPI 文档信息（kuma.springdoc）
kuma:
  springdoc:
    title: API 文档
    description: RESTful API 接口文档
    version: 1.0.0
    license-name: Apache 2.0
    license-url: https://www.apache.org/licenses/LICENSE-2.0.html
