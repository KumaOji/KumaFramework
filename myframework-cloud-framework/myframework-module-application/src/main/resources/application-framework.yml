# Myframework 框架基础配置（通过 spring.config.import 加载）
# 项目 application.yml 中未定义的项将使用此配置
spring:
  main:
    lazy-initialization: true
    banner-mode: off
    log-startup-info: false
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - com.kuma.boot.spring.web.swagger.SpringDocAutoConfiguration
  datasource:
    dynamic:
      datasource:
        mysql:
          hikari:
            minimum-idle: 1
            maximum-pool-size: 10
            connection-timeout: 10000

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.kuma.boot: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

mybatis-plus:
  global-config:
    banner: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

kuma:
  cache:
    caffeine:
      cache-names: default
      initial-capacity: 100
      maximum-size: 1000
      expire-after-write-minutes: 30
      expire-after-access-minutes: 30
  schema-switch:
    enabled: false
    order: -100
  mybatis:
    default-schema: public
  springdoc:
    title: API 文档
    description: RESTful API 接口文档
    version: 1.0.0
    license-name: Apache 2.0
    license-url: https://www.apache.org/licenses/LICENSE-2.0.html
